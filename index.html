/* ============================== PRIMITIVES ============================== */
const cx = (...a)=>a.filter(Boolean).join(' ');
// モック操作可能化：遷移先が無いボタンでも「無反応」にせず、画面下に軽量トーストを出す。
const mockTap = (msg)=>{ try{ window.dispatchEvent(new CustomEvent('forkids-mocktap',{detail: msg||'この操作はモックのデモ表示です'})); }catch(e){} };

function Card({children, className=''}){
  return <div className={cx('bg-white rounded-2xl border border-[#F3E6D9] shadow-card', className)}>{children}</div>;
}
function CardHead({icon, title, action}){
  return (
    <div className="flex items-center justify-between px-5 pt-4 pb-3">
      <div className="flex items-center gap-2">
        {icon && <span className="text-brand-500"><Ic name={icon} className="w-[18px] h-[18px]"/></span>}
        <h3 className="font-bold text-ink text-[15px]">{title}</h3>
      </div>
      {action}
    </div>
  );
}
function Badge({children, tone='gray'}){
  const t = {
    gray:'bg-gray-100 text-gray-600', green:'bg-[#E8F5E9] text-green-700',
    orange:'bg-brand-50 text-brand-600', pink:'bg-[#FFE4EA] text-pink-600',
    purple:'bg-[#EEE7FB] text-purple-600', blue:'bg-[#E7F0FB] text-blue-600',
    amber:'bg-amber-50 text-amber-600', red:'bg-red-50 text-red-600',
  }[tone];
  return <span className={cx('inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[11px] font-bold', t)}>{children}</span>;
}
function Avatar({name, color='#FDC089', size=40, ring=false}){
  const ch = (name||'?').trim().charAt(0);
  return <div className={cx('flex items-center justify-center rounded-full font-bold text-white shrink-0', ring&&'ring-2 ring-white shadow')} style={{width:size,height:size,background:color,fontSize:size*0.42}}>{ch}</div>;
}
function Btn({children, kind='primary', icon, onClick, className=''}){
  const k = {
    primary:'bg-brand-500 hover:bg-brand-600 text-white shadow-soft',
    soft:'bg-brand-50 hover:bg-brand-100 text-brand-600',
    ghost:'bg-white hover:bg-brand-50 text-gray-500 border border-[#E8D5C4]',
    dark:'bg-ink hover:bg-slate-800 text-white',
  }[kind];
  // onClick 未指定のボタンは無反応にせず、ラベルを添えてモック・トーストを出す。
  const txt = typeof children==='string' ? children : null;
  const handle = onClick || (()=> mockTap(txt ? '「'+txt+'」はこのモックではデモ表示です' : 'この操作はモックのデモ表示です'));
  return <button onClick={handle} className={cx('inline-flex items-center justify-center gap-1.5 rounded-xl font-bold text-[13px] px-4 py-2 transition active:scale-[0.98]', k, className)}>
    {icon && <Ic name={icon} className="w-4 h-4"/>}{children}
  </button>;
}
function Tabs({tabs, active, onChange}){
  return (
    <div className="inline-flex bg-cream rounded-xl p-1 border border-[#F3E6D9]">
      {tabs.map(t=> <button key={t} onClick={()=>onChange(t)}
        className={cx('px-4 py-2 rounded-lg text-[13px] font-bold transition active:scale-95', active===t?'bg-white text-brand-600 shadow-card':'text-gray-500 hover:text-gray-700')}>{t}</button>)}
    </div>
  );
}
function Stat({label, value, tone='ink'}){
  const c = {ink:'text-ink', orange:'text-brand-500', red:'text-red-500', green:'text-green-600'}[tone];
  return <div className="text-center"><div className="text-[12px] text-muted font-bold mb-1">{label}</div><div className={cx('text-2xl font-extrabold',c)}>{value}</div></div>;
}
function AIChip(){ return <Badge tone="purple"><Ic name="ai" className="w-3 h-3"/>AI生成</Badge>; }

/* 汎用モーダル：fixed オーバーレイ（portal不要）。open=false で描画しない。 */
function Modal({open, onClose, title, sub, icon, children, footer, wide=false}){
  if(!open) return null;
  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4" onClick={onClose}>
      <div className="absolute inset-0 bg-ink/40 backdrop-blur-[2px]"/>
      <div onClick={e=>e.stopPropagation()} className={cx('relative bg-white w-full rounded-t-3xl sm:rounded-3xl shadow-xl border border-[#F3E6D9] max-h-[92vh] overflow-y-auto noscroll', wide?'sm:max-w-3xl':'sm:max-w-lg')}>
        <div className="flex items-start gap-3 px-5 pt-5 pb-3 sticky top-0 bg-white/95 backdrop-blur border-b border-[#F3E6D9] z-10">
          {icon && <span className="w-9 h-9 rounded-xl bg-brand-50 text-brand-500 flex items-center justify-center shrink-0"><Ic name={icon} className="w-5 h-5"/></span>}
          <div className="flex-1 min-w-0"><h3 className="font-extrabold text-ink text-[17px] leading-tight">{title}</h3>{sub && <p className="text-[12px] text-muted font-bold mt-0.5">{sub}</p>}</div>
          <button onClick={onClose} className="text-muted hover:text-ink p-1 -mr-1 shrink-0"><Ic name="plus" className="w-5 h-5 rotate-45"/></button>
        </div>
        <div className="px-5 py-4">{children}</div>
        {footer && <div className="px-5 py-3 border-t border-[#F3E6D9] bg-cream/40 flex flex-wrap gap-2 justify-end sticky bottom-0">{footer}</div>}
      </div>
    </div>
  );
}
/* トグルスイッチ（制御）。on/onToggle で状態を持つ側が管理。 */
function Toggle({on, onToggle, label}){
  return (
    <button onClick={onToggle} className="inline-flex items-center gap-2 text-[13px] font-bold text-ink">
      <span className={cx('w-9 h-5 rounded-full relative transition', on?'bg-brand-500':'bg-gray-300')}>
        <span className={cx('absolute top-0.5 w-4 h-4 bg-white rounded-full transition-all', on?'right-0.5':'left-0.5')}/>
      </span>
      {label}
    </button>
  );
}
/* 横バー（進捗・比率）。pct=0..100、tone で色。 */
function Bar({pct, tone='brand'}){
  const c={brand:'bg-brand-400', green:'bg-green-400', amber:'bg-amber-400', purple:'bg-purple-400', pink:'bg-pink-400', red:'bg-red-400'}[tone]||'bg-brand-400';
  return <div className="h-2 rounded-full bg-cream overflow-hidden border border-[#F3E6D9]"><div className={cx('h-full rounded-full', c)} style={{width:Math.max(0,Math.min(100,pct))+'%'}}/></div>;
}

  if(o==='deny') return false;

};

// 帳票の印刷／PDFプレビュー（紙面体裁）。要録／出席簿／健康記録／月次レポートを A4縦想定で表示。

  if(!form) return null;
  const kid = kidName || 'さくら';
  const TITLES={要録:'幼稚園幼児指導要録（学籍・指導の記録）', 出席簿:'出席簿', 健康記録:'健康記録カード', 月次レポート:'成長レポート'};
  const aoba = KIDS.filter(k=>k.klass==='あおば組').slice(0,6);
  const seals=[['担任','田中',true],['主任','佐々木',stage>=2],['園長','塚田',stage>=3]];
  const cell='border border-[#D8C8B6] px-2 py-1.5';
  return (
    <Modal open={!!form} onClose={onClose} wide icon="file" title={TITLES[form]+' の出力プレビュー'} sub="印刷／PDFと同じ体裁で確認できます（モック）"
      footer={<><span className="text-[11px] font-bold text-warm mr-auto flex items-center gap-1"><Ic name="file" className="w-3.5 h-3.5"/>A4縦・余白20mm想定</span><Btn kind="ghost" icon="file" onClick={()=>mockTap(form+'をExcelで出力（モック）')}>Excel</Btn><Btn kind="primary" icon="file" onClick={()=>mockTap(form+'をPDF出力／印刷（モック）')}>PDF・印刷</Btn></>}>
      <div className="bg-white rounded-lg border border-[#E8D5C4] shadow-card mx-auto" style={{maxWidth:560}}>
        <div className="p-5 sm:p-7 text-ink">
          {/* 共通ヘッダ */}
          <div className="text-center border-b-2 border-ink/80 pb-2 mb-3">
            {form==='要録' && <div className="text-[10px] text-muted font-bold tracking-widest">守谷市様式 v2025</div>}
            <div className="text-[17px] font-extrabold tracking-wide">{TITLES[form]}</div>
            <div className="text-[11px] text-muted font-bold mt-0.5">あおば幼稚園 ・ {form==='出席簿'||form==='健康記録'?'2026年6月 あおば組':'2026年度 あおば組（年長）'}</div>
          </div>

          {form==='要録' && <>
            <table className="w-full text-[11px] mb-3"><tbody>
              {[['氏名',kid,'性別','女'],['生年月日','2020年7月15日','学級','あおば組（年長）'],['在籍期間','2023.4.1〜','園名','あおば幼稚園']].map((r,i)=>(
                <tr key={i}>{[0,2].map(c=><React.Fragment key={c}><td className={cx(cell,'bg-cream/50 font-bold w-20')}>{r[c]}</td><td className={cx(cell,'font-bold')}>{r[c+1]}</td></React.Fragment>)}</tr>
              ))}
            </tbody></table>
            <div className="text-[12px] font-extrabold mb-1">指導上参考となる事項（5領域）</div>
            <table className="w-full text-[11px] mb-3"><tbody>
              {rows.map((r,i)=>(<tr key={i}><td className={cx(cell,r.care?'bg-red-50':'bg-cream/50','font-bold w-24 align-top')}>{r.k}</td><td className={cx(cell,'leading-relaxed')}>{r.body}</td></tr>))}
            </tbody></table>
            <div className="flex justify-end gap-3 mt-4">
              {seals.map((s,i)=>(
                <div key={i} className="text-center">
                  <div className="text-[10px] font-bold text-muted mb-1">{s[0]}</div>
                  <div className={cx('w-12 h-12 rounded-full flex items-center justify-center text-[11px] font-extrabold', s[2]?'border-2 border-red-400 text-red-500':'border border-dashed border-[#D8C8B6] text-muted')}>{s[2]?s[1]:'印'}</div>
                </div>
              ))}
            </div>
          </>}

          {form==='出席簿' && (()=>{ const days=Array.from({length:10},(_,i)=>i+1); return <>
            <table className="w-full text-[10px] text-center"><thead><tr><th className={cx(cell,'bg-cream/50 text-left')}>園児＼日</th>{days.map(d=><th key={d} className={cx(cell,'bg-cream/50 w-6')}>{d}</th>)}<th className={cx(cell,'bg-cream/50')}>出席</th></tr></thead>
            <tbody>{aoba.map((k,ri)=>{ let present=0; const marks=days.map((d,di)=>{ const v=(ri+di)%7===0?'欠':(ri+di)%11===0?'遅':'○'; if(v!=='欠')present++; return v; }); return (
              <tr key={k.id}><td className={cx(cell,'text-left font-bold')}>{k.n}</td>{marks.map((m,mi)=><td key={mi} className={cx(cell, m==='欠'?'text-red-500':m==='遅'?'text-amber-500':'text-ink')}>{m}</td>)}<td className={cx(cell,'font-extrabold')}>{present}/10</td></tr>
            );})}</tbody></table>
            <div className="text-[11px] font-bold text-muted mt-2">○＝出席 ・ 欠＝欠席 ・ 遅＝遅刻 ／ まいにちチェックの出欠から自動集計（モック）</div>
          </>; })()}

          {form==='健康記録' && <table className="w-full text-[11px] text-center"><thead><tr>{['園児','検温(平均)','食事','排便','午睡','服薬'].map((h,i)=><th key={i} className={cx(cell,'bg-cream/50',i===0&&'text-left')}>{h}</th>)}</tr></thead>
            <tbody>{aoba.map((k,ri)=>{ const t=(36.4+(ri%4)/10).toFixed(1); const hot=Number(t)>=36.8; return (
              <tr key={k.id}><td className={cx(cell,'text-left font-bold')}>{k.n}</td><td className={cx(cell,hot&&'text-red-500 font-bold')}>{t}℃</td><td className={cell}>{['完食','半分','少し'][ri%3]}</td><td className={cell}>{ri%2?'○':'—'}</td><td className={cell}>{ri%3?'60分':'—'}</td><td className={cell}>{ri%4===0?'あり':'—'}</td></tr>
            );})}</tbody></table>}

          {form==='月次レポート' && <>
            <div className="rounded-lg overflow-hidden border border-[#F3E6D9] mb-3"><div className="h-20 bg-gradient-to-br from-cat-orange to-brand-300 flex items-end p-3"><div className="text-white"><div className="text-[10px] font-bold opacity-90">2026年6月</div><div className="text-lg font-extrabold">さくらの ひとつき</div></div></div></div>
            <p className="text-[12px] leading-relaxed mb-3">今月のさくらちゃんは、だんごむしの観察に夢中でした。「あしは何本？」と自分から問いを立て、図鑑で調べてお友だちに教えてあげる姿が印象的でした。</p>
            <div className="grid grid-cols-3 gap-1.5 mb-3">{['#FDC089','#C8B3ED','#ADDABB','#FFD0D8','#AFD0F0','#F4C6A6'].map((c,i)=><div key={i} className="aspect-square rounded" style={{background:c}}/>)}</div>
            <div className="bg-cream/60 rounded-lg p-2.5 text-[12px] font-bold border border-[#F3E6D9]"><span className="text-brand-600">担任より：</span>ご家庭でも「なんでだろうね？」と一緒に考えてみてください。</div>
          </>}
        </div>
      </div>
    </Modal>
  );
}

/* 園児の緊急連絡先（架空・id から決定的）。園児カルテ・名簿センターで共用。 */
function kidFamily(i){
  return {nm:['佐藤','鈴木','高橋','田村','小林','加藤'][i%6], gv:['花子','美咲','恵','彩','真由','香'][i%6], rel:['母','父','祖母'][i%3], tel:'090-xxxx-'+(1000+i), pick:['母・祖母','父・母','母・祖父'][i%3]};
}

        </div>
        <div>
          <div className="text-[12px] text-muted font-bold mb-2">緊急連絡先</div>
          <div className="space-y-1.5 text-[13px]">
            <div className="flex items-center justify-between p-2.5 rounded-xl border border-[#F3E6D9]"><span className="font-bold text-ink">{fm.nm} {fm.gv}（{fm.rel}）</span><span className="text-gray-600 font-bold">{fm.tel}</span></div>
            <div className="flex items-center justify-between p-2.5 rounded-xl border border-[#F3E6D9]"><span className="text-muted font-bold">お迎え可能者</span><span className="font-bold text-ink">{fm.pick}</span></div>
          </div>
        </div>
        <div>
          <div className="text-[12px] text-muted font-bold mb-2">健康・特記</div>
          <div className="flex flex-wrap gap-1.5">
            {(child.id%3===0? ['卵アレルギー','代替食']: child.id%3===1? ['熱性けいれん既往']: ['特記なし']).map((t,i)=>(<Badge key={i} tone={t==='特記なし'?'gray':'red'}>{t}</Badge>))}
            <Badge tone="green">内科健診 6/10予定</Badge>
          </div>
        </div>
      </div>
    </Modal>
  );
}

function Roster(){
  // klass は KIDS（単一情報源）を参照。cert は年長児のため3号認定は付かない（1号／2号のみ・施設サマリと整合）。
  const base = KIDS.map((k,i)=>({...k, cert:['1号','2号'][i%2], guardian:['佐藤','鈴木','高橋','田中'][i%4]}));
  const [extra,setExtra] = useState([]); // 追加した園児（操作で名簿に反映）
  const all = [...extra, ...base];
  const [sel,setSel] = useState(null); // 園児詳細モーダル対象id（行→統合個票）
  const [q,setQ] = useState('');        // 検索（名前・保護者）
  const filters = ['全クラス','あおば組','ふたば組','つぼみ組','1号認定','2号認定'];
  const [f,setF] = useState('全クラス');
  const [adding,setAdding] = useState(false);
  const [form,setForm] = useState({n:'', klass:'あおば組', cert:'1号', guardian:''});
  const rows = all.filter(r=>{
    if(q && !((r.n||'').includes(q) || (r.guardian||'').includes(q))) return false;
    if(f==='全クラス') return true;
    if(f==='1号認定') return r.cert==='1号';
    if(f==='2号認定') return r.cert==='2号';
    return r.klass===f;
  }).slice(0,12);
  const KLASS_COLORS={'あおば組':'#FDC089','ふたば組':'#C8B3ED','つぼみ組':'#ADDABB'};
  const addKid = ()=>{
    if(!form.n.trim()) return;
    const id = 900 + extra.length;
    setExtra(e=>[{n:form.n.trim(), klass:form.klass, color:KLASS_COLORS[form.klass]||'#AFD0F0', age:'年長', id, rec:true, cert:form.cert, guardian:(form.guardian.trim()||'—')}, ...e]);
    setAdding(false); setForm({n:'', klass:'あおば組', cert:'1号', guardian:''});
  };
  return (
    <div>
      <PageHead title="名簿センター" sub="在園児・未就園児・職員を一元管理。すべての機能のハブ。"
        action={<div className="flex gap-2"><Btn kind="ghost" icon="file" onClick={()=>mockTap('名簿をCSVで入出力（モック）')}>CSV入出力</Btn><Btn kind="primary" icon="plus" onClick={()=>setAdding(true)}>園児を追加</Btn></div>} />
      <Card className="p-3 mb-4">
        <div className="flex flex-wrap items-center gap-2">
          <div className="flex items-center gap-2 bg-cream rounded-xl px-3 py-2 flex-1 min-w-[180px] border border-[#F3E6D9]"><Ic name="search" className="w-4 h-4 text-muted"/><input value={q} onChange={e=>setQ(e.target.value)} placeholder="名前・保護者で検索" className="flex-1 bg-transparent text-[13px] font-bold text-ink outline-none placeholder:text-muted"/>{q&&<button onClick={()=>setQ('')} className="text-muted"><Ic name="plus" className="w-4 h-4 rotate-45"/></button>}</div>
          {filters.map((x,i)=><button key={i} onClick={()=>setF(x)} className={cx('px-3 py-2 rounded-xl text-[12px] font-bold border', f===x?'bg-brand-500 text-white border-brand-500':'bg-white text-gray-500 border-[#E8D5C4]')}>{x}</button>)}
        </div>
      </Card>
      <div className="text-[12px] text-muted font-bold mb-2 px-1">{rows.length}名を表示中（絞り込み：{f}{q&&'・「'+q+'」'}）</div>
      <Card className="overflow-hidden">
        <table className="w-full text-[13px] block overflow-x-auto whitespace-nowrap md:table md:overflow-visible md:whitespace-normal">
          <thead><tr className="text-left text-muted font-bold border-b border-[#F3E6D9] bg-cream/40">
            {['園児','クラス','認定区分','保護者','タグ',''].map((h,i)=><th key={i} className="px-5 py-3">{h}</th>)}
          </tr></thead>
          <tbody>
            {rows.length===0 && <tr><td colSpan={6} className="px-5 py-8 text-center text-muted font-bold">該当する園児はいません</td></tr>}
            {rows.map(r=>(
              <tr key={r.id} className="border-b border-[#F7EFE7] hover:bg-cream/40">
                <td className="px-5 py-3"><div className="flex items-center gap-2"><Avatar name={r.n} color={r.color} size={32}/><span className="font-bold text-ink">{r.n}</span>{r.id>=900&&<Badge tone="orange">新規</Badge>}</div></td>
                <td className="px-5 py-3 font-bold text-gray-600">{r.klass}</td>
                <td className="px-5 py-3"><Badge tone="blue">{r.cert}認定</Badge></td>
                <td className="px-5 py-3 font-bold text-gray-600">{r.guardian}家</td>
                <td className="px-5 py-3">{r.id%2===0? <Badge tone="red">アレルギー</Badge> : <Badge tone="green">兄弟あり</Badge>}</td>
                <td className="px-5 py-3 text-right"><button onClick={()=>setSel(r.id)} className="text-brand-500" title="園児の個票を開く"><Ic name="chevron" className="w-4 h-4"/></button></td>
              </tr>
            ))}
          </tbody>
        </table>
      </Card>
      <KidProfileModal child={sel!=null?all.find(k=>k.id===sel):null} onClose={()=>setSel(null)}/>
      <Modal open={adding} onClose={()=>setAdding(false)} icon="users" title="園児を追加" sub="名簿に新しい園児を登録します（モック）"
        footer={<><Btn kind="ghost" onClick={()=>setAdding(false)}>キャンセル</Btn><Btn kind="primary" icon="check" onClick={addKid}>この内容で追加</Btn></>}>
        <div className="space-y-3">
          <div><div className="text-[12px] text-muted font-bold mb-1">園児の名前</div><input value={form.n} onChange={e=>setForm(f=>({...f,n:e.target.value}))} placeholder="例）あおい" className="w-full bg-cream rounded-xl border border-[#F3E6D9] p-3 text-[14px] font-bold text-ink outline-none placeholder:text-muted"/></div>
          <div><div className="text-[12px] text-muted font-bold mb-1">クラス</div><div className="flex flex-wrap gap-2">{['あおば組','ふたば組','つぼみ組'].map(c=><button key={c} onClick={()=>setForm(f=>({...f,klass:c}))} className={cx('px-3 py-2 rounded-xl text-[13px] font-bold border', form.klass===c?'bg-brand-500 text-white border-brand-500':'bg-white text-gray-600 border-[#E8D5C4]')}>{c}</button>)}</div></div>
          <div><div className="text-[12px] text-muted font-bold mb-1">認定区分</div><div className="flex gap-2">{['1号','2号','3号'].map(c=><button key={c} onClick={()=>setForm(f=>({...f,cert:c}))} className={cx('px-3 py-2 rounded-xl text-[13px] font-bold border', form.cert===c?'bg-brand-500 text-white border-brand-500':'bg-white text-gray-600 border-[#E8D5C4]')}>{c}認定</button>)}</div></div>
          <div><div className="text-[12px] text-muted font-bold mb-1">保護者の姓</div><input value={form.guardian} onChange={e=>setForm(f=>({...f,guardian:e.target.value}))} placeholder="例）山田" className="w-full bg-cream rounded-xl border border-[#F3E6D9] p-3 text-[14px] font-bold text-ink outline-none placeholder:text-muted"/></div>
          <div className="text-[11px] font-bold text-warm flex items-start gap-1.5"><Ic name="lock" className="w-3.5 h-3.5 mt-0.5 shrink-0"/>本デモは架空データです。実運用では重複チェック・必須項目の検証を行います。</div>
        </div>
      </Modal>
    </div>
  );
}

function Broadcast(){
  // 作成フロー：宛先選択(対象世帯が連動)→件名/本文 実入力→予約/即時→確認モーダル(誤配信防止)→配信で履歴に反映
  const AUD = [['あおば組',24],['ひまわり組',26],['ゆり組',25],['年長 全体',50],['年中 全体',52],['全園児の家庭',268],['アレルギー対象家庭',12],['バス利用家庭',38]];
  const [dest,setDest] = useState(['あおば組','年長 全体','アレルギー対象家庭']);
  const [adding,setAdding] = useState(false);
  const [subject,setSubject] = useState('【あおば組】6月の保育参観のお知らせ');
  const [body,setBody] = useState('保護者のみなさまへ。6月の保育参観を下記の通り実施します。持ち物は上履き・水筒です。詳しくは添付のしおりをご覧ください。');
  const [reserve,setReserve] = useState(true);
  const [attach,setAttach] = useState(['しおり_6月保育参観.pdf']);
  const [confirming,setConfirming] = useState(false);
  const [done,setDone] = useState(null);
  // 通知チャネル（コミュなび=3チャネルの設計移植）・既読確認の利用有無・未読への再通知
  const [chPush,setChPush] = useState(true);
  const [chMail,setChMail] = useState(true);
  const [chSub,setChSub] = useState(false);
  const [readCheck,setReadCheck] = useState(true);
  const [resent,setResent] = useState({});
  const [hist,setHist] = useState([
    {t:'遠足のしおり', s:'既読 98%', pct:98, tone:'green', rc:true},
    {t:'献立変更のお知らせ', s:'既読 86%', pct:86, tone:'amber', rc:true},
    {t:'写真販売開始', s:'既読 72%', pct:72, tone:'amber', rc:true},
  ]);
  // 緊急時テンプレ（コミュなび=災害緊急連絡の定型下書きが初期から用意されている設計の移植）
  const URGENT = [
    {k:'引き渡し依頼', sub:'【緊急】お子さまの引き渡しのお願い', body:'保護者のみなさまへ。災害発生に伴い、安全のためお子さまの引き渡しを行います。園までお迎えをお願いします。お迎えの際は職員に氏名をお伝えください。来られない場合はこの連絡に返信してください。'},
    {k:'居場所確認', sub:'【緊急】園児の無事と居場所のお知らせ', body:'保護者のみなさまへ。本日の災害発生時、園児は全員無事です。現在、全園児は園舎2階ホールに避難しています。続報はこの連絡でお知らせします。電話は緊急連絡用に空けてください。'},
  ];
  const useUrgent = (u)=>{
    setSubject(u.sub); setBody(u.body); setDest(['全園児の家庭']); setReserve(false); setReadCheck(true); setChPush(true); setChMail(true); setChSub(true); setDone(null);
    mockTap('緊急テンプレ「'+u.k+'」を呼び出しました。内容を確認して配信してください（モック・本番は下書きとして常備）');
  };
  const channels = ()=> [chPush&&'プッシュ通知', chMail&&'メール', chSub&&'サブメール'].filter(Boolean);
  const homes = AUD.filter(a=>dest.includes(a[0])).reduce((s,a)=>s+a[1],0);
  const ready = dest.length>0 && body.trim().length>0 && channels().length>0;
  const cand = AUD.filter(a=>!dest.includes(a[0]));
  const send = ()=>{
    setHist(h=>[{t:subject.trim()||'（件名なし）', s:reserve?'予約中':(readCheck?'既読 0%':'既読確認なし'), pct:0, tone:reserve?'blue':'gray', rc:readCheck}, ...h]);
    setDone((reserve ? '6月3日 7:30 に配信を予約しました' : '配信しました')+'（'+channels().join('＋')+'・モック）');
    setConfirming(false);
  };
  const renotify = (i)=>{ setResent(r=>({...r,[i]:true})); mockTap('未読の家庭のみに「（再送）」付きで通知を再送しました。送信履歴は増えません（モック）'); };
  return (
    <div>
      <PageHead title="一斉連絡・配信" sub="宛先を選んで、プッシュ＋メールで確実に届ける"/>
      {done && (
        <Card className="p-4 mb-5 border-green-200 bg-[#E8F5E9]/50 flex items-center gap-3">
          <span className="w-9 h-9 rounded-xl bg-green-100 text-green-600 flex items-center justify-center shrink-0"><Ic name="check" className="w-5 h-5"/></span>
          <div className="flex-1 font-bold text-ink text-[14px]">{done}<div className="text-[12px] text-muted">既読状況は右の「直近の配信」で追えます。</div></div>
          <Btn kind="soft" icon="plus" onClick={()=>{setDone(null);setSubject('');setBody('');setAttach([]);}}>新しい連絡を作成</Btn>
        </Card>
      )}
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-5">
        <Card className="col-span-2 p-5 space-y-4">
          <div className="flex flex-wrap items-center gap-2 rounded-xl bg-red-50/60 border border-red-100 px-3 py-2">
            <span className="text-[12px] font-bold text-red-600 shrink-0">緊急時テンプレ（常備）</span>
            {URGENT.map(u=>(
              <button key={u.k} onClick={()=>useUrgent(u)} className="px-3 py-1.5 rounded-xl text-[12px] font-bold bg-white border border-red-200 text-red-600 hover:bg-red-50 active:scale-95 transition">{u.k}</button>
            ))}
            <span className="text-[10px] font-bold text-red-400 w-full sm:w-auto">タップで件名・本文・宛先(全園児)を即セット＝有事に一から書かない</span>
          </div>
          <div>
            <div className="flex items-center justify-between mb-1"><span className="text-[12px] text-muted font-bold">宛先</span><span className="text-[12px] font-bold text-brand-600">対象 {homes} 世帯（重複家庭には1回のみ）</span></div>
            <div className="flex flex-wrap gap-2 items-center">
              {dest.map((t,i)=>(
                <span key={t} className={cx('inline-flex items-center gap-1 rounded-full px-2.5 py-1 text-[12px] font-bold', i===0?'bg-brand-50 text-brand-600':'bg-cream text-gray-600 border border-[#F3E6D9]')}>
                  {t}<button onClick={()=>setDest(d=>d.filter(x=>x!==t))} className="hover:text-red-500" title={t+' を宛先から外す'}><Ic name="plus" className="w-3 h-3 rotate-45"/></button>
                </span>
              ))}
              <button onClick={()=>setAdding(a=>!a)} className="text-[12px] font-bold text-brand-600">{adding?'閉じる':'+ 追加'}</button>
            </div>
            {adding && (
              <div className="mt-2 p-3 rounded-xl bg-cream/60 border border-[#F3E6D9] flex flex-wrap gap-2">
                {cand.length===0 ? <span className="text-[12px] text-muted font-bold">追加できる宛先候補はありません</span>
                  : cand.map(a=>(
                    <button key={a[0]} onClick={()=>setDest(d=>[...d,a[0]])} className="inline-flex items-center gap-1 rounded-full px-2.5 py-1 text-[12px] font-bold bg-white text-gray-600 border border-dashed border-[#E8D5C4] hover:border-brand-300 hover:text-brand-600 transition">
                      ＋ {a[0]}<span className="text-muted">{a[1]}世帯</span>
                    </button>
                  ))}
              </div>
            )}
            {dest.length===0 && <div className="mt-1 text-[12px] font-bold text-red-500">宛先を1つ以上選んでください</div>}
          </div>
          <div><div className="text-[12px] text-muted font-bold mb-1">件名</div>
            <input value={subject} onChange={e=>setSubject(e.target.value)} placeholder="件名を入力" className="w-full bg-cream rounded-xl px-4 py-3 text-[14px] text-ink border border-[#F3E6D9] font-bold focus:outline-none focus:border-brand-300"/></div>
          <div><div className="text-[12px] text-muted font-bold mb-1">本文</div>
            <textarea value={body} onChange={e=>setBody(e.target.value)} placeholder="本文を入力" className="w-full bg-cream rounded-xl px-4 py-3 text-[14px] text-ink border border-[#F3E6D9] leading-relaxed h-28 resize-none focus:outline-none focus:border-brand-300"/></div>
          {attach.length>0 && (
            <div className="flex flex-wrap gap-2">
              {attach.map(f=>(
                <span key={f} className="inline-flex items-center gap-1.5 rounded-xl px-3 py-1.5 text-[12px] font-bold bg-brand-50 text-brand-600">
                  <Ic name="file" className="w-3.5 h-3.5"/>{f}
                  <button onClick={()=>setAttach(a=>a.filter(x=>x!==f))} className="hover:text-red-500" title={f+' を外す'}><Ic name="plus" className="w-3 h-3 rotate-45"/></button>
                </span>
              ))}
            </div>
          )}
          <div className="flex flex-wrap items-center gap-x-4 gap-y-2 rounded-xl bg-cream/50 border border-[#F3E6D9] px-3 py-2">
            <span className="text-[12px] text-muted font-bold shrink-0">通知チャネル</span>
            <Toggle on={chPush} onToggle={()=>setChPush(v=>!v)} label="プッシュ"/>
            <Toggle on={chMail} onToggle={()=>setChMail(v=>!v)} label="メール"/>
            <Toggle on={chSub} onToggle={()=>setChSub(v=>!v)} label="サブメールにも"/>
            {channels().length===0 && <span className="text-[11px] font-bold text-red-500">1つ以上選んでください</span>}
          </div>
          <div className="flex flex-wrap items-center gap-2">
            <span className="text-[12px] text-muted font-bold">既読確認</span>
            {[['利用する','既読率を追跡・未読へ再通知可'],['利用しない','開封の記録なし']].map(([x,d])=>(
              <button key={x} onClick={()=>setReadCheck(x==='利用する')} title={d} className={cx('px-3 py-1.5 rounded-xl text-[12px] font-bold border transition', (x==='利用する')===readCheck?'bg-brand-500 text-white border-brand-500':'bg-white text-gray-500 border-[#E8D5C4]')}>{x}</button>
            ))}
            <span className="text-[11px] font-bold text-muted">{readCheck?'家庭ごとの既読が追え、未読へ再通知できます':'配信のみ（開封は記録しません）'}</span>
          </div>
          <div className="flex items-center gap-3 flex-wrap">
            <Toggle on={reserve} onToggle={()=>setReserve(r=>!r)} label="予約送信"/>
            <span className="text-[13px] text-muted font-bold">{reserve?'6月3日 7:30':'今すぐ配信'}</span>
            <Btn kind="ghost" icon="camera" className="ml-auto" onClick={()=>setAttach(a=>[...a,'IMG_06'+String(10+a.length)+'.jpg'])}>添付</Btn>
            <Btn kind={ready?'primary':'ghost'} icon="send" onClick={()=>{ if(!ready){ mockTap('宛先・本文・通知チャネルを設定すると配信できます'); return; } setConfirming(true); }}>{reserve?'予約配信する':'今すぐ配信する'}</Btn>
          </div>
          <div className="flex items-start gap-2 text-[11px] font-bold text-warm bg-cream/60 rounded-xl px-3 py-2 border border-[#F3E6D9]">
            <Ic name="shield" className="w-3.5 h-3.5 shrink-0 mt-0.5"/>
            <span>一斉配信は対外発信のため、本番では園長の承認（承認ボックス）を経て送信されます。宛先は必要最小限に（個人情報保護）。</span>
          </div>
        </Card>
        <Card className="p-5">
          <CardHead icon="chart" title="直近の配信"/>
          <div className="px-5 pb-5 space-y-3">
            {hist.map((r,i)=>(
              <div key={i}><div className="flex items-center justify-between gap-1 text-[13px]"><span className="font-bold text-ink flex-1 min-w-0 truncate">{r.t}</span><Badge tone={r.tone}>{r.s}</Badge></div>
                <div className="h-1.5 rounded-full bg-cream mt-1.5 overflow-hidden"><div className="h-full bg-brand-400" style={{width:r.pct+'%'}}/></div>
                {r.rc && r.pct>0 && r.pct<90 && (resent[i]
                  ? <div className="mt-1 text-[11px] font-bold text-green-600">（再送）通知を未読家庭へ再送済み</div>
                  : <button onClick={()=>renotify(i)} className="mt-1 text-[11px] font-bold text-brand-600 underline">未読へ再通知（履歴は増えません）</button>)}
              </div>
            ))}
          </div>
        </Card>
      </div>
      <Modal open={confirming} onClose={()=>setConfirming(false)} title="配信内容の確認" sub="誤配信防止のため、宛先と内容を最終確認してください" icon="send"
        footer={<><Btn kind="ghost" onClick={()=>setConfirming(false)}>戻って直す</Btn><Btn kind="primary" icon="send" onClick={send}>{reserve?'予約を確定':'この内容で配信'}</Btn></>}>
        <div className="space-y-3">
          <div className="rounded-xl border border-[#F3E6D9] divide-y divide-[#F7EFE7]">
            {AUD.filter(a=>dest.includes(a[0])).map(a=>(
              <div key={a[0]} className="flex justify-between px-4 py-2 text-[13px]"><span className="font-bold text-ink">{a[0]}</span><span className="text-muted font-bold">{a[1]} 世帯</span></div>
            ))}
            <div className="flex justify-between px-4 py-2 text-[13px] bg-cream/50"><span className="font-extrabold text-ink">対象合計（重複除く想定）</span><span className="font-extrabold text-brand-600">{homes} 世帯</span></div>
          </div>
          <div className="grid grid-cols-2 gap-2 text-[13px]">

function Billing(){
  // タッチ打刻：児童をタップで 未登園→在園中→降園 を循環。在園中の人数が連動。
  const [stamp,setStamp]=useState({}); // id -> 'in'|'out'
  const cycle=(id)=> setStamp(s=>{ const cur=s[id]; const nx= cur===undefined?'in': cur==='in'?'out':undefined; const n={...s}; if(nx===undefined) delete n[id]; else n[id]=nx; return n; });
  const here=Object.values(stamp).filter(v=>v==='in').length;
  const [fixed,setFixed]=useState(false);
  const [inv,setInv]=useState(null);     // 請求書プレビュー対象index
  const [sent,setSent]=useState({});     // 送付済の請求書index
  // 精算なびA7の移植: 口座登録→確定→入金の3状態ライフサイクル・全銀の双方向(出力+結果インポート)・無償化の分離ビュー。
  const [pay,setPay]=useState({0:true,1:true});  // 入金済index
  const [view,setView]=useState('精算一覧');
  const bill=(i)=>({ base:27000, ext:i*1500, meal:4500+i*300, free:25700, total:5800+i*1800 });
  const hasBank=(i)=> i!==3;                      // 口座登録済（3=コンビニ払い予定）
  const rows5=KIDS.slice(0,5);
  const totalAll=rows5.reduce((s,_,i)=>s+bill(i).total,0);
  const paidSum=rows5.reduce((s,_,i)=>s+(pay[i]?bill(i).total:0),0);
  const unpaidN=rows5.filter((_,i)=>!pay[i]).length;
  const importBank=()=>{ const n={...pay}; rows5.forEach((_,i)=>{ if(hasBank(i)) n[i]=true; }); setPay(n); mockTap('全銀の振替結果を取り込み、入金を消し込みました（口座登録済の家庭・モック）'); };
  return (
    <div>
      <PageHead title="登降園・精算" sub="タッチ打刻 → 時間記録 → 月次精算（無償化・全銀・インボイス対応）"/>

            </div>
            <div className="rounded-xl border border-[#F3E6D9] divide-y divide-[#F7EFE7]">

}

    4:{inout:'07:48 -', alg:'乳', app:null, home:{t:'36.4', bf:'完食', sl:'20:45-6:30', txt:'プールを楽しみにしています。'}},

  const [val,setVal] = useState('');            // 入力中の本文
  const [pendingPhoto,setPendingPhoto] = useState(false); // 添付予定の写真
  const [reserve,setReserve] = useState(false); // 予約公開（お迎え時 15:30）

    if(dr.some(m=>m.reserved)) return '予約';
    if((t.today && t.msgs.some(m=>m.who==='先生')) || dr.length) return '記入済';
    return '未記入'; };
  const parentState = (i)=>{ const t=THREADS[i]||{}; const hasP=t.msgs.some(m=>m.who==='保護者')||META[i]&&META[i].home;
    if(!hasP) return 'なし'; return (t.unread && !readHome[i]) ? '未読' : '既読'; };
  const unfilled = list.filter((_,i)=>teacherState(i)==='未記入').length;
  const shownIdx = list.map((_,i)=>i).filter(i=> fil==='すべて' || (fil==='未記入' && teacherState(i)==='未記入') || (fil==='保護者未読' && parentState(i)==='未読'));
  const k = list[sel]; const th = THREADS[sel] || {date:'—', msgs:[]}; const mt = META[sel]||{};
  const allMsgs = [...th.msgs, ...(drafts[sel]||[])];
  const pick = (i)=>{ setSel(i); setVal(''); setPendingPhoto(false); setReadHome(r=>({...r,[i]:true})); };

  const send = ()=>{ if(!val.trim() && !pendingPhoto) return;
    setDrafts(d=>({...d, [sel]:[...(d[sel]||[]), {who:'先生', txt:val.trim()||'（写真を送りました）', photo: pendingPhoto?k.color:null, reserved:reserve}]}));

            <Ic name="chevron" className="w-4 h-4 text-amber-400"/>
          </div>
        </button>

      <div className="grid grid-cols-1 lg:grid-cols-3 gap-5">
        <Card className="p-2">
          <div className="px-2 py-2 flex flex-wrap items-center gap-1.5">
            {['すべて','未記入','保護者未読'].map(x=>(
              <button key={x} onClick={()=>setFil(x)} className={cx('px-2.5 py-1.5 rounded-lg text-[11px] font-bold border transition', fil===x?'bg-brand-500 text-white border-brand-500':'bg-white text-gray-500 border-[#E8D5C4]')}>{x}</button>
            ))}
          </div>
          <div className="px-3 pb-1 text-[10px] font-bold text-muted">家=保護者の記入（橙=未読）／園=今日の先生記入</div>
          {shownIdx.map((i)=>{ const kid=list[i];
            const t = THREADS[i]||{}; const dr=drafts[i]; const last = (dr&&dr.length)? dr[dr.length-1] : (t.msgs && t.msgs[t.msgs.length-1]);
            const ts=teacherState(i), ps=parentState(i);
            return (
              <button key={kid.id} onClick={()=>pick(i)} className={cx('w-full text-left flex items-center gap-2 p-2 rounded-xl transition', i===sel?'bg-brand-50 ring-1 ring-brand-200':'hover:bg-cream/60')}>
                <Avatar name={kid.n} color={kid.color} size={36}/>
                <div className="flex-1 min-w-0"><div className="font-bold text-[13px] text-ink">{kid.n}</div><div className="text-[11px] text-muted font-bold truncate">{last?last.txt:'やり取りなし'}</div></div>
                <span className="flex flex-col items-end gap-0.5 shrink-0">
                  {ps!=='なし' && <span className={cx('text-[9px] font-bold px-1.5 py-0.5 rounded-full leading-none', ps==='未読'?'bg-brand-500 text-white':'bg-[#E8F5E9] text-green-700')}>家{ps==='未読'?'・未読':''}</span>}
                  <span className={cx('text-[9px] font-bold px-1.5 py-0.5 rounded-full leading-none', ts==='記入済'?'bg-[#E8F5E9] text-green-700': ts==='予約'?'bg-[#EFF6FD] text-[#3F6E99]':'bg-cream text-muted border border-[#E8D5C4]')}>園{ts==='未記入'?'・未記入': ts==='予約'?'・予約':''}</span>
                </span>
              </button>
            );
          })}
          {shownIdx.length===0 && <div className="px-3 py-4 text-center text-[12px] font-bold text-muted">該当なし</div>}
        </Card>
        <Card className="col-span-2 p-5">
          <div className="flex items-center gap-2 mb-2 pb-2 border-b border-[#F3E6D9]"><Avatar name={k.n} color={k.color} size={40}/><div><div className="font-extrabold text-ink">{k.n} ・ {th.date}</div><div className="text-[11px] text-muted font-bold">あおば組 ・ {allMsgs.length}件のやり取り</div></div><span className="ml-auto"><Badge tone="green"><Ic name="check" className="w-3 h-3"/>既読</Badge></span></div>
          {/* 当日メタの統合表示（ぎゅっとなび=連絡・登降園・アレルギー・申請が1画面） */}
          <div className="flex flex-wrap gap-1.5 mb-3">
            <span className="inline-flex items-center gap-1 rounded-lg bg-cream/70 border border-[#F3E6D9] px-2 py-1 text-[11px] font-bold text-ink"><Ic name="clock" className="w-3 h-3 text-brand-400"/>登降園 {mt.inout||'—'}</span>
            {mt.alg && <span className="inline-flex items-center gap-1 rounded-lg bg-red-50 border border-red-100 px-2 py-1 text-[11px] font-bold text-red-600">アレルギー：{mt.alg}</span>}

function DailyCheck(){
  const cols = ['午睡','排便','検温','食事','水分','服薬'];
  const classes = ['あおば組','ふたば組','つぼみ組'];
  const [klass,setKlass] = useState('あおば組');
  const [att,setAtt] = useState({});      // id→'出席'|'欠席'|'遅刻'（未入力=未設定）
  const [saved,setSaved] = useState(false);
  const rows = KIDS.filter(k=>k.klass===klass).slice(0,8);
  const ATT = {出席:['出席','green'], 欠席:['欠席','red'], 遅刻:['遅刻','amber']};
  const NEXT = {undefined:'出席', 出席:'欠席', 欠席:'遅刻', 遅刻:undefined};
  const cycle = (id)=>{ setSaved(false); setAtt(a=>{ const n={...a}; const nx=NEXT[a[id]]; if(nx===undefined) delete n[id]; else n[id]=nx; return n; }); };
  const switchKlass = (c)=>{ setKlass(c); setSaved(false); };
  const copyPrev = ()=>{ setSaved(false); setAtt(a=>{ const n={...a}; rows.forEach(k=>{ if(!n[k.id]) n[k.id]='出席'; }); return n; }); };
  const entered = rows.filter(k=>att[k.id]).length;
  const absent = rows.filter(k=>att[k.id]==='欠席').length;
  const fever = rows.filter((k,ri)=> (5+ri%4)>=8).length; // 36.8℃以上を「やや高め」として可視化
  return (
    <div className="pb-24 md:pb-0">{/* モバイルは下部固定バーの分の余白 */}
      <PageHead title="まいにちチェック" sub="出欠・午睡・排便・検温・食事・水分・服薬を一括記録。前回コピーで時短。園児の出欠をタップで記録。"
        action={<div className="hidden md:flex gap-2"><Btn kind="soft" icon="check" onClick={copyPrev}>前回をコピー</Btn><Btn kind="primary" icon="check" onClick={()=>setSaved(true)}>この内容で保存</Btn></div>}/>
      {saved && <Card className="p-3 mb-4 border-2 border-[#CDEBD6] bg-[#F2FBF5]"><div className="flex items-center gap-2 text-[13px]"><span className="w-7 h-7 rounded-lg bg-[#E8F5E9] text-green-600 flex items-center justify-center"><Ic name="check" className="w-4 h-4"/></span><span className="font-bold text-ink">{klass}の本日のチェックを保存しました（出欠 {entered}/{rows.length}名・欠席 {absent}名）。欠席はバス・精算・れんらく帳に連動します。</span></div></Card>}
      <Card className="p-3 mb-4">
        <div className="flex flex-wrap items-center gap-2">
          <Tabs tabs={classes} active={klass} onChange={switchKlass}/>
          <span className="ml-auto inline-flex items-center gap-1 text-[12px] font-bold text-muted"><Ic name="calendar" className="w-4 h-4"/>2026年6月2日（火）</span>
        </div>
      </Card>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
        <Card className="p-4"><Stat label="記録対象" value={rows.length+'名'}/></Card>
        <Card className="p-4"><Stat label="出欠入力" value={entered+'/'+rows.length+'名'} tone={entered===rows.length?'green':'orange'}/></Card>
        <Card className="p-4"><Stat label="欠席" value={absent+'名'} tone={absent?'red':'ink'}/></Card>
        <Card className="p-4"><Stat label="検温やや高め" value={fever+'名'} tone={fever?'red':'ink'}/></Card>
      </div>
      <Card className="overflow-hidden">
        {/* 担任=スマホ前提: 園児列をstickyにして横スクロール中も誰の行か見える。出欠ボタンは指で押せる大きさ(44px級)。 */}

function YoroukuList({go}){
  // 状態フィルタで「承認の進み具合」を可視化。要録=要保育所児童保育要録の電子化フロー。
  // 行の明細→FormPreview(A4紙面・承認stage連動)、編集→3方向出力(要録タブ)へ。未生成は「未生成をAI下書き」で一括生成。
  const init = KIDS.slice(0,7).map((k,i)=>({...k, draft:i%3!==2, status:['承認済','承認待ち','下書き'][i%3]}));
  const [all,setAll] = useState(init);
  const filters = ['すべて','下書き','承認待ち','承認済','未生成'];
  const [f,setF] = useState('すべて');
  const [preview,setPreview] = useState(null);   // {n, stage}
  const STAGE = {'下書き':0, '承認待ち':1, '承認済':3};
  const pending = all.filter(r=>!r.draft).length;
  const genDrafts = ()=>{
    if(pending===0){ mockTap('未生成の要録はありません'); return; }
    setAll(l=>l.map(r=>r.draft?r:{...r, draft:true, status:'下書き'}));
    mockTap(pending+'名分の要録をAIが下書きしました（モック・担任の確認が必要です）');
  };
  const rows = all.filter(r=> f==='すべて' ? true : f==='未生成' ? !r.draft : r.status===f);
  const done = all.filter(r=>r.status==='承認済').length;
  const pct = Math.round(done/all.length*100);
  return (
    <div>
      <PageHead title="要録一覧" sub="AI下書き → 編集 → 担任・主任・園長の承認 → 小学校引継ぎ。履歴も保持。"
        action={<div className="flex gap-2"><Btn kind="soft" icon="ai" onClick={genDrafts}>未生成をAI下書き{pending>0?'（'+pending+'名）':''}</Btn><Btn kind="primary" icon="file" onClick={()=>mockTap('承認済の要録を一括PDF出力（モック）')}>一括PDF出力</Btn></div>}/>
      <Card className="p-5 mb-4">
        <div className="flex items-center justify-between mb-2"><span className="text-[13px] font-bold text-ink">年長クラスの要録 承認進捗</span><span className="text-[13px] font-extrabold text-brand-600">{done}/{all.length}名 ・ {pct}%</span></div>
        <div className="h-2.5 rounded-full bg-cream overflow-hidden"><div className="h-full bg-brand-400 rounded-full transition-all" style={{width:pct+'%'}}/></div>
      </Card>
      <Card className="p-3 mb-4"><div className="flex flex-wrap gap-2">{filters.map(x=><button key={x} onClick={()=>setF(x)} className={cx('px-3 py-1.5 rounded-xl text-[12px] font-bold border', f===x?'bg-brand-500 text-white border-brand-500':'bg-white text-gray-500 border-[#E8D5C4]')}>{x}</button>)}</div></Card>
      <Card className="overflow-hidden">
        <table className="w-full text-[13px] block overflow-x-auto whitespace-nowrap md:table md:overflow-visible md:whitespace-normal">
          <thead><tr className="text-left text-muted font-bold border-b border-[#F3E6D9] bg-cream/40">{['園児','クラス','AI下書き','承認状況','出力'].map((h,i)=><th key={i} className="px-5 py-3">{h}</th>)}</tr></thead>
          <tbody>{rows.length===0
            ? <tr><td colSpan={5} className="px-5 py-8 text-center text-muted font-bold">該当する要録はありません</td></tr>
            : rows.map((r)=>(
            <tr key={r.id} className="border-b border-[#F7EFE7] hover:bg-cream/40">
              <td className="px-5 py-3"><div className="flex items-center gap-2"><Avatar name={r.n} color={r.color} size={30}/><span className="font-bold text-ink">{r.n}</span></div></td>
              <td className="px-5 py-3 font-bold text-gray-600">{r.klass}</td>
              <td className="px-5 py-3">{r.draft? <AIChip/> : <Badge tone="gray">未生成</Badge>}</td>
              <td className="px-5 py-3">{r.status==='承認済'? <Badge tone="green">園長承認済</Badge> : r.status==='承認待ち'? <Badge tone="amber">主任承認待ち</Badge> : <Badge tone="gray">下書き</Badge>}</td>
              <td className="px-5 py-3"><div className="flex gap-1">
                <button title={r.n+'さんの要録プレビュー'} onClick={()=>{ r.draft ? setPreview({n:r.n, stage:STAGE[r.status]||0}) : mockTap(r.n+'さんの要録は未生成です。「未生成をAI下書き」で生成してください'); }} className="text-brand-500 p-2 -m-1"><Ic name="file" className="w-5 h-5"/></button>
                <button title={r.n+'さんの要録を編集（3方向出力へ）'} onClick={()=>{ go && go('output'); }} className="text-brand-500 p-2 -m-1"><Ic name="edit" className="w-5 h-5"/></button>
              </div></td>
            </tr>
          ))}</tbody>
        </table>
      </Card>
      <div className="mt-3 text-[12px] text-muted font-bold px-1">※ 明細（紙面プレビュー）は承認状況に応じて押印欄が変わります。編集は 3方向出力（要録タブ）で行います。</div>
      <FormPreview form={preview?'要録':null} rows={YOROKU_ROWS} stage={preview?preview.stage:0} kidName={preview&&preview.n} onClose={()=>setPreview(null)}/>
    </div>
  );
}

  ]);
  // 乗降確認：在園児(rec)は タップで 乗車待ち→乗車→降車 を循環。欠席児は対象外。
  const initial = {}; KIDS.forEach(k=>{ if(k.rec) initial[k.id]='待ち'; });
  const [status,setStatus] = useState(initial);
  const NEXT = {'待ち':'乗車','乗車':'降車','降車':'待ち'};
  const cycle = (id)=> setStatus(s=> ({...s, [id]: NEXT[s[id]||'待ち']}) );
  const boarded = Object.values(status).filter(v=>v==='乗車'||v==='降車').length;
  const absent = KIDS.filter(k=>!k.rec).length;
  const ST = {'待ち':['乗車待ち','gray'],'乗車':['乗車','green'],'降車':['降車','blue']};
  // コース編集：モーダル内のドラフトを保存でカードへ反映。停留所は上下入替・削除・追加。
  const [editIdx,setEditIdx] = useState(null);
  const [draft,setDraft] = useState(null);
  const openEdit = (i)=>{ const c=courses[i]; setDraft({bus:c.bus, dep:c.dep, stops:c.stops.slice()}); setEditIdx(i); };
  const moveStop = (i,d)=> setDraft(dr=>{ const s=dr.stops.slice(); const j=i+d; if(j<0||j>=s.length) return dr; const t=s[i]; s[i]=s[j]; s[j]=t; return {...dr, stops:s}; });
  const [newStop,setNewStop] = useState('');
  const saveEdit = ()=>{
    if(draft.stops.length===0){ mockTap('停留所を1つ以上残してください'); return; }
    setCourses(cs=> cs.map((c,i)=> i===editIdx ? {...c, bus:draft.bus, dep:draft.dep, stops:draft.stops} : c));
    setEditIdx(null);
    mockTap('コースを保存しました（モック・本番は保護者へ変更通知＋園長承認）');
  };
  // --- 運行マップ・経路算出・出発→次家庭通知（コミュなび風・架空データ） ---
  const [selC,setSelC] = useState(0);          // マップ表示中のコース
  const [busAt,setBusAt] = useState({});       // course index → 現在地（route上のindex）
  const [notif,setNotif] = useState([]);       // 出発通知フィード（最新が先頭）
  const [pin,setPin] = useState(null);         // 停留所詳細モーダル {si}
  const [optimized,setOptimized] = useState(false);
  const [patrol,setPatrol] = useState({});     // course index → 車内見回り完了
  const segMin = (i)=> 3 + ((i*2)%4);          // 区間所要（分・架空。本番はルーティングAPIの実測）
  const depMin = (dep)=>{ const a=dep.split(':'); return Number(a[0])*60+Number(a[1]); };
  const fmtT = (min)=> Math.floor(min/60)+':'+String(min%60).padStart(2,'0');
  const [dir,setDir] = useState('登園');        // 登園/降園切替（コミュなび文法）
  const [pview,setPview] = useState(false);     // 保護者ビュー（園が保護者の見え方を確認）
  const depFor = (c)=> dir==='登園' ? c.dep : '15:15';
  const route = (c)=> c.stops.map(s=>({name:s})).concat([{name:'園 到着', goal:true}]);
  const etaMin = (c, idx)=>{ let t=depMin(depFor(c)); for(let i=1;i<=idx;i++) t+=segMin(i); return t; };
  const eta = (c, idx)=> fmtT(etaMin(c, idx));
  // GPS実績（架空・決定的）：通過済み停留所の実通過時刻＝予定±2分。本番はGPS通過判定の実測。
  const actDelta = (i)=> ((i*7)%5)-2;
  const actual = (c, idx)=> fmtT(etaMin(c, idx)+actDelta(idx));
  const ontime = (c, at)=>{ let n=0,ok=0; for(let i=1;i<=at;i++){ n++; if(actDelta(i)<=0) ok++; } return n? Math.round(ok/n*100) : 100; };
  const totalMin = (c)=>{ let t=0; for(let i=1;i<route(c).length;i++) t+=segMin(i); return t; };
  const stopKids = (c, si)=> c.kids.filter((_,ki)=> ki%c.stops.length===si);
  // マップ座標は停留所数から決定的に生成（コース編集での増減にも追従）
  const pts = (c)=>{ const r=route(c); const n=Math.max(r.length-1,1); return r.map((s,i)=>({...s, x: 30 + i*(340/n), y: 150 - (i%2)*62 + ((i%3)*16)})); };
  const depart = ()=>{
    const c=courses[selC]; const r=route(c); const at=Math.min(busAt[selC]||0, r.length-1);
    if(at>=r.length-1) return;
    const nxt=r[at+1];
    if(!nxt.goal){
      const fams=stopKids(c,at+1).filter(k=>k.rec).map(k=>k.n+'さん宅');
      setNotif(n=>[{stop:nxt.name, mins:segMin(at+1), fams, at:eta(c,at+1), course:c.name},...n].slice(0,6));
      mockTap(nxt.name+' の '+fams.length+' 家庭へ「まもなくバス到着（あと'+segMin(at+1)+'分）」を自動送信（モック）');
    } else {
      mockTap('園に到着しました。車内見回りチェック（置き去り確認）を行ってください');
    }
    setBusAt(b=>({...b,[selC]:at+1}));
  };
  // 遅延一斉連絡：対象コース・遅延分数を選んで確認→送信で運行状況KPIに反映。
  const [delayOpen,setDelayOpen] = useState(false);
  const [delayTarget,setDelayTarget] = useState('すべてのコース');
  const [delayMin,setDelayMin] = useState(10);
  const [delayed,setDelayed] = useState(null);   // {target,min}
  const sendDelay = ()=>{ setDelayed({target:delayTarget, min:delayMin}); setDelayOpen(false); };
  const DEP_OPTS = ['7:50','7:55','8:00','8:05','8:10','8:15','8:20','8:25','8:30','8:35','8:40','8:45'];
  return (
    <div>
      <PageHead title="バスなび" sub="運行ルート・乗降確認・お迎え時刻を保護者と共有。欠席連絡は乗車予定から自動で除外。園児をタップで乗降を記録。"
        action={<div className="flex gap-2"><Btn kind="ghost" icon="bell" onClick={()=>setDelayOpen(true)}>遅延を一斉連絡</Btn><Btn kind="primary" icon="edit" onClick={()=>openEdit(0)}>コースを編集</Btn></div>}/>
      {delayed && (
        <Card className="p-4 mb-5 border-amber-200 bg-amber-50/60 flex items-center gap-3">
          <span className="w-9 h-9 rounded-xl bg-amber-100 text-amber-600 flex items-center justify-center shrink-0"><Ic name="bell" className="w-5 h-5"/></span>
          <div className="flex-1 font-bold text-ink text-[14px]">{delayed.target} の約{delayed.min}分遅延を保護者へ連絡しました（プッシュ＋メール・モック）<div className="text-[12px] text-muted">運行状況が「遅延」になりました。解消したら定刻に戻してください。</div></div>
          <Btn kind="soft" icon="check" onClick={()=>setDelayed(null)}>定刻に戻す</Btn>
        </Card>
      )}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-5">
        <Card className="p-4"><Stat label="運行コース" value={String(courses.length)} tone="ink"/></Card>
        <Card className="p-4"><Stat label="本日の乗車" value={boarded+'名'} tone="orange"/></Card>
        <Card className="p-4"><Stat label="欠席で除外" value={absent+'名'} tone="red"/></Card>
        <Card className="p-4"><Stat label="運行状況" value={delayed?'遅延':'定刻'} tone={delayed?'red':'green'}/></Card>
      </div>

      {/* 運行マップ＝経路の可視化・ETA・出発→次家庭への自動通知。担任スマホ前提（マップ全幅・大きい出発ボタン）。 */}
      <Card className="mb-5 overflow-hidden">
        <CardHead icon="bus" title="運行マップ・出発通知" action={<Tabs tabs={courses.map(c=>c.name.split('コース')[0])} active={courses[selC].name.split('コース')[0]} onChange={(t)=>setSelC(Math.max(0,courses.findIndex(c=>c.name.split('コース')[0]===t)))}/>}/>
        <div className="px-5 pb-5">
          {(()=>{ const c=courses[selC]; const r=route(c); const P=pts(c); const at=Math.min(busAt[selC]||0, r.length-1); const done=at>=r.length-1;
            const normal=c.kids.length, absent2=c.kids.filter(k=>!k.rec).length, today=normal-absent2; return (<>
            {/* 登園/降園切替＋人数サマリ＋保護者ビュー（コミュなび文法の移植） */}
            <div className="flex flex-wrap items-center gap-2 mb-3">
              <Tabs tabs={['登園','降園']} active={dir} onChange={(t)=>setDir(t)}/>
              <span className="inline-flex items-center gap-1 rounded-xl bg-cream/70 border border-[#F3E6D9] px-3 py-1.5 text-[12px] font-bold text-ink">通常 {normal}人 <span className="text-red-500">−{absent2}</span> → 本日 <span className="text-brand-600 text-[14px]">{today}人</span></span>
              <span className="inline-flex items-center gap-1 rounded-xl bg-cream/70 border border-[#F3E6D9] px-3 py-1.5 text-[12px] font-bold text-ink">定刻運行率 <span className={cx('text-[14px]', ontime(c,at)>=80?'text-green-600':'text-amber-600')}>{ontime(c,at)}%</span></span>
              <button onClick={()=>setPview(v=>!v)} className={cx('ml-auto px-3 py-1.5 rounded-xl text-[12px] font-bold border transition', pview?'bg-brand-500 text-white border-brand-500':'bg-white text-gray-500 border-[#E8D5C4]')}>{pview?'園ビューに戻す':'保護者ビューで確認'}</button>
            </div>
            {pview && <div className="mb-2 text-[11px] font-bold text-[#5B8DBE] bg-[#EFF6FD] rounded-xl px-3 py-2">保護者にはこのように見えています（公開する項目＝現在位置/バス停/コース/軌跡/実績時刻は園の設定で変更できます・モック）。</div>}
            <div className="rounded-2xl border border-[#F3E6D9] bg-[#F4F8F2] overflow-hidden">
              <svg viewBox="0 0 400 200" className="w-full h-auto block" role="img" aria-label="運行マップ">
                <line x1="0" y1="60" x2="400" y2="60" stroke="#E3EBDD" strokeWidth="10"/>
                <line x1="0" y1="150" x2="400" y2="150" stroke="#E3EBDD" strokeWidth="10"/>
                <line x1="90" y1="0" x2="90" y2="200" stroke="#E3EBDD" strokeWidth="8"/>
                <line x1="250" y1="0" x2="250" y2="200" stroke="#E3EBDD" strokeWidth="8"/>
                {/* コミュなび文法: グレー破線=コース全体、色付き実線=走行済みの軌跡 */}
                <polyline points={P.map(p=>p.x+','+p.y).join(' ')} fill="none" stroke="#B9C4B3" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" strokeDasharray="1 7"/>
                {at>0 && <polyline points={P.slice(0,at+1).map(p=>p.x+','+p.y).join(' ')} fill="none" stroke="#E07B4A" strokeWidth="5" strokeLinecap="round" strokeLinejoin="round"/>}
                {P.map((p,i)=>(
                  <g key={i} onClick={()=>setPin({si:i})} style={{cursor:'pointer'}}>
                    <circle cx={p.x} cy={p.y} r="13" fill={i<at?'#9BC79F': i===at?'#E07B4A':'#fff'} stroke={p.goal?'#7A9E7E':'#E07B4A'} strokeWidth="2.5"/>
                    <text x={p.x} y={p.y+4} textAnchor="middle" fontSize="11" fontWeight="700" fill={i<=at?'#fff':'#A66A42'}>{p.goal?'園':String(i+1)}</text>
                    {!p.goal && (i<at && !pview
                      ? <text x={p.x} y={p.y+28} textAnchor="middle" fontSize="9" fontWeight="700" fill={actDelta(i)>0?'#D14848':'#4E8C55'}>実 {actual(c,i)}</text>
                      : <text x={p.x} y={p.y+28} textAnchor="middle" fontSize="9" fontWeight="700" fill="#8B7355">{eta(c,i)}</text>)}
                  </g>
                ))}
                <g><circle cx={P[at].x} cy={P[at].y-24} r="11" fill="#fff" stroke="#E07B4A" strokeWidth="2"/><text x={P[at].x} y={P[at].y-19.5} textAnchor="middle" fontSize="12">🚌</text></g>
              </svg>
            </div>
            <div className="mt-1 text-[11px] font-bold text-muted px-1">グレー破線＝コース／色つき実線＝走行済みの軌跡。ピンをタップ＝家庭・予定/実績時刻。{dir}便・出発 {depFor(c)}。</div>
            <div className="mt-3 flex flex-wrap items-center gap-2">
              <div className="flex-1 min-w-[200px]">
                <div className="text-[12px] text-muted font-bold">バス現在地{at>0 && !done ? '（実 '+actual(c,at)+' 通過・予定 '+eta(c,at)+'）' : ''}</div>
                <div className="font-extrabold text-ink">{r[at].name}</div>
                {!done && <div className="text-[12px] font-bold text-brand-600">次は {r[at+1].name}（あと{segMin(at+1)}分・{eta(c,at+1)} 着予定）</div>}
              </div>
              {!pview && (!done
                ? <Btn kind="primary" icon="send" onClick={depart} className="py-3 px-5">この停留所を出発</Btn>
                : (patrol[selC]
                    ? <span className="inline-flex items-center gap-1.5 rounded-xl bg-[#E8F5E9] text-green-700 text-[13px] font-bold px-4 py-3"><Ic name="check" className="w-4 h-4"/>車内見回り完了・置き去りゼロ確認済</span>
                    : <Btn kind="dark" icon="check" onClick={()=>{ setPatrol(p=>({...p,[selC]:true})); mockTap('車内見回りチェック完了：座席・座席下を確認し置き去りゼロを記録しました（モック）'); }} className="py-3 px-5">車内見回りチェック</Btn>))}
              {!pview && at>0 && <Btn kind="ghost" onClick={()=>{ setBusAt(b=>({...b,[selC]:0})); setPatrol(p=>({...p,[selC]:false})); }}>リセット</Btn>}
            </div>
            {!pview && <div className="mt-3 flex flex-wrap items-center gap-2 rounded-xl bg-cream/60 border border-[#F3E6D9] px-3 py-2">
              <Ic name="ai" className="w-4 h-4 text-brand-500 shrink-0"/>
              <div className="flex-1 min-w-[200px] text-[12px] font-bold text-warm">最適巡回順で運行中：{c.stops.length}停留所・総所要 約{totalMin(c)}分・総距離 約5.8km（架空）。本番は VRP（OR-Tools等）＋ルーティングAPI（Google Maps Directions等）で算出します。</div>
              <Btn kind="soft" icon="ai" onClick={()=>setOptimized(true)}>経路を再計算</Btn>
            </div>}
            {optimized && !pview && <div className="mt-2 text-[12px] font-bold text-green-700 bg-[#E8F5E9] rounded-xl px-3 py-2">再計算結果：現在の巡回順が最短でした（候補3案中・渋滞情報を加味してETAを更新・モック）。</div>}
            {notif.length>0 && (
              <div className="mt-3">
                <div className="text-[12px] text-muted font-bold mb-1.5">出発通知の送信履歴（前の停留所を出ると自動送信）</div>
                <div className="space-y-1.5">{notif.map((n,i)=>(
                  <div key={i} className="flex items-center gap-2 rounded-xl border border-[#AFD0F0]/70 bg-[#EFF6FD] px-3 py-2">
                    <Ic name="bell" className="w-4 h-4 text-[#5B8DBE] shrink-0"/>
                    <div className="flex-1 text-[12px] font-bold text-ink">{n.stop}（{n.at} 着予定）の {n.fams.length} 家庭へ「まもなくバス到着・あと{n.mins}分」を送信</div>
                  </div>
                ))}</div>
              </div>
            )}
          </>); })()}
        </div>
      </Card>

      <div className="grid grid-cols-1 lg:grid-cols-3 gap-5">
        {courses.map((c,i)=>(
          <Card key={i} className="p-5">
            <div className="flex items-center gap-2 mb-3">
              <div className="w-9 h-9 rounded-xl bg-brand-50 flex items-center justify-center text-brand-500"><Ic name="bus" className="w-5 h-5"/></div>
              <div className="flex-1"><div className="font-bold text-ink text-[14px]">{c.name}</div><div className="text-[11px] text-muted font-bold">{c.bus}・出発 {c.dep}</div></div>
              <button onClick={()=>openEdit(i)} className="text-brand-500 p-1" title={c.name+' を編集'}><Ic name="edit" className="w-4 h-4"/></button>
            </div>
            <div className="space-y-2">
              {c.kids.map((k,ki)=>{ const st=ST[status[k.id]]||null; return (
                k.rec
                ? <button key={k.id} onClick={()=>cycle(k.id)} className="w-full text-left flex items-center gap-2 p-2 rounded-xl border border-[#F3E6D9] hover:border-brand-300 hover:bg-cream/40 transition" title="タップで 乗車待ち→乗車→降車">
                    <Avatar name={k.n} color={k.color} size={30}/>
                    <div className="flex-1"><div className="font-bold text-[13px] text-ink">{k.n}</div><div className="text-[11px] text-muted font-bold">{c.stops[ki%c.stops.length]}</div></div>
                    <Badge tone={st[1]}>{st[0]==='乗車'?<><Ic name="check" className="w-3 h-3"/>乗車</>:st[0]}</Badge>
                  </button>
                : <div key={k.id} className="flex items-center gap-2 p-2 rounded-xl border border-[#F3E6D9] bg-red-50/30">
                    <Avatar name={k.n} color={k.color} size={30}/>
                    <div className="flex-1"><div className="font-bold text-[13px] text-red-500 line-through">{k.n}</div><div className="text-[11px] text-red-400 font-bold line-through">{c.stops[ki%c.stops.length]}</div></div>
                    <span className="text-[11px] font-bold text-red-500">欠席・自動キャンセル</span>
                  </div>
              );})}
            </div>
          </Card>
        ))}
      </div>
      <div className="mt-3 rounded-xl bg-cream/60 border border-[#F3E6D9] px-3 py-2 text-[11px] font-bold text-warm">
        出欠・預かり申請からの自動キャンセル：<span className="text-red-500">欠席→登園・降園とも</span>／遅刻→登園便のみ／早退→降園便のみ／朝預かり→登園便のみ／夕預かり→降園便のみ。取り消し線＝乗車しない園児（理由つき）。点呼チェックは随時自動保存されます（モック）。
      </div>

      <Modal open={editIdx!==null} onClose={()=>setEditIdx(null)} icon="bus" title="コースを編集" sub="バス種別・出発時刻・停留所の順序を変更できます"
        footer={<><Btn kind="ghost" onClick={()=>setEditIdx(null)}>キャンセル</Btn><Btn kind="primary" icon="check" onClick={saveEdit}>この内容で保存</Btn></>}>
        {draft && <div className="space-y-3">
          <div className="flex flex-wrap gap-2">{courses.map((c,i)=>(
            <button key={i} onClick={()=>openEdit(i)} className={cx('px-3 py-1.5 rounded-xl text-[12px] font-bold border transition', editIdx===i?'bg-brand-500 text-white border-brand-500':'bg-white text-gray-500 border-[#E8D5C4]')}>{c.name}</button>
          ))}</div>
          <div><div className="text-[12px] text-muted font-bold mb-1">バス種別</div>
            <div className="flex gap-2">{['大型バス','中型バス','小型バス'].map(b=>(
              <button key={b} onClick={()=>setDraft(d=>({...d,bus:b}))} className={cx('px-3 py-1.5 rounded-xl text-[12px] font-bold border transition', draft.bus===b?'bg-brand-500 text-white border-brand-500':'bg-white text-gray-500 border-[#E8D5C4]')}>{b}</button>
            ))}</div></div>
          <div><div className="text-[12px] text-muted font-bold mb-1">出発時刻</div>
            <div className="flex flex-wrap gap-1.5">{DEP_OPTS.map(t=>(
              <button key={t} onClick={()=>setDraft(d=>({...d,dep:t}))} className={cx('px-2.5 py-1 rounded-lg text-[12px] font-bold border transition', draft.dep===t?'bg-brand-500 text-white border-brand-500':'bg-white text-gray-500 border-[#E8D5C4]')}>{t}</button>
            ))}</div></div>
          <div><div className="text-[12px] text-muted font-bold mb-1">停留所（上から順に巡回）</div>
            <div className="space-y-1.5">{draft.stops.map((s,i)=>(
              <div key={s+i} className="flex items-center gap-2 rounded-xl border border-[#F3E6D9] px-3 py-2">
                <span className="w-5 h-5 rounded-full bg-brand-50 text-brand-600 text-[11px] font-extrabold flex items-center justify-center shrink-0">{i+1}</span>
                <span className="flex-1 text-[13px] font-bold text-ink">{s}</span>
                <button onClick={()=>moveStop(i,-1)} className="text-muted hover:text-brand-500 px-1" title="上へ">↑</button>
                <button onClick={()=>moveStop(i,1)} className="text-muted hover:text-brand-500 px-1" title="下へ">↓</button>
                <button onClick={()=>setDraft(d=>({...d, stops:d.stops.filter((_,j)=>j!==i)}))} className="text-muted hover:text-red-500" title={s+' を削除'}><Ic name="plus" className="w-4 h-4 rotate-45"/></button>
              </div>
            ))}</div>
            <div className="flex gap-2 mt-2">
              <input value={newStop} onChange={e=>setNewStop(e.target.value)} placeholder="停留所を追加" className="flex-1 bg-cream rounded-xl px-3 py-2 text-[13px] text-ink border border-[#F3E6D9] font-bold focus:outline-none focus:border-brand-300"/>
              <Btn kind="soft" icon="plus" onClick={()=>{ const v=newStop.trim(); if(!v){return;} if(draft.stops.includes(v)){mockTap('同じ停留所があります');return;} setDraft(d=>({...d, stops:[...d.stops, v]})); setNewStop(''); }}>追加</Btn>
            </div></div>
          <div className="flex items-start gap-2 text-[11px] font-bold text-warm bg-cream/60 rounded-xl px-3 py-2 border border-[#F3E6D9]">
            <Ic name="shield" className="w-3.5 h-3.5 shrink-0 mt-0.5"/>
            <span>コース変更は送迎の安全に直結するため、本番では保護者への変更通知と園長の承認（承認ボックス）を経て反映されます。</span>
          </div>
        </div>}
      </Modal>

      <Modal open={delayOpen} onClose={()=>setDelayOpen(false)} icon="bell" title="遅延を保護者へ一斉連絡" sub="対象コースと遅延の目安を選んで送信します"
        footer={<><Btn kind="ghost" onClick={()=>setDelayOpen(false)}>キャンセル</Btn><Btn kind="primary" icon="send" onClick={sendDelay}>この内容で連絡</Btn></>}>
        <div className="space-y-3">
          <div><div className="text-[12px] text-muted font-bold mb-1">対象コース</div>
            <div className="flex flex-wrap gap-2">{['すべてのコース'].concat(courses.map(c=>c.name)).map(t=>(
              <button key={t} onClick={()=>setDelayTarget(t)} className={cx('px-3 py-1.5 rounded-xl text-[12px] font-bold border transition', delayTarget===t?'bg-brand-500 text-white border-brand-500':'bg-white text-gray-500 border-[#E8D5C4]')}>{t}</button>
            ))}</div></div>
          <div><div className="text-[12px] text-muted font-bold mb-1">遅延の目安</div>
            <div className="flex gap-2">{[5,10,15,20].map(m=>(
              <button key={m} onClick={()=>setDelayMin(m)} className={cx('px-3 py-1.5 rounded-xl text-[12px] font-bold border transition', delayMin===m?'bg-brand-500 text-white border-brand-500':'bg-white text-gray-500 border-[#E8D5C4]')}>約{m}分</button>
            ))}</div></div>
          <div className="rounded-xl bg-cream/60 px-3 py-2 text-[13px] border border-[#F3E6D9]"><div className="text-[11px] text-muted font-bold">送信される文面（自動生成）</div>
            <p className="font-bold text-ink mt-1">【バス遅延のお知らせ】{delayTarget}は道路状況により約{delayMin}分の遅れが見込まれます。お迎えの時間にご注意ください。</p></div>
          <div className="flex items-start gap-2 text-[11px] font-bold text-warm bg-cream/60 rounded-xl px-3 py-2 border border-[#F3E6D9]">
            <Ic name="shield" className="w-3.5 h-3.5 shrink-0 mt-0.5"/>
            <span>遅延連絡は乗車予定の家庭のみに送られます（宛先最小化）。安全に関わる速報のため、本番では承認を簡略化した緊急配信枠を使います。</span>
          </div>
        </div>
      </Modal>

      <Modal open={!!pin} onClose={()=>setPin(null)} icon="bus"
        title={pin && route(courses[selC])[Math.min(pin.si, route(courses[selC]).length-1)].name}
        sub={pin && (()=>{ const c2=courses[selC]; const r2=route(c2); const at2=Math.min(busAt[selC]||0, r2.length-1); const s=r2[pin.si];
          if(s && s.goal) return c2.name+'・終点（園）';
          return c2.name+'・'+dir+'便 予定 '+eta(c2,pin.si)+(pin.si<at2 ? '／実績 '+actual(c2,pin.si)+'（GPS通過判定）' : ' 着予定'); })()}>
        {pin && (route(courses[selC])[pin.si] && route(courses[selC])[pin.si].goal
          ? <div className="text-[13px] font-bold text-ink">全園児の降車後、<span className="text-brand-600">車内見回りチェック（置き去り確認）</span>を行って運行を終了します。チェック結果は記録され、未実施はアラートになります（モック）。</div>
          : <div className="space-y-2">
              {stopKids(courses[selC], pin.si).map(k=>(
                <div key={k.id} className="flex items-center gap-2 rounded-xl border border-[#F3E6D9] px-3 py-2">
                  <Avatar name={k.n} color={k.color} size={28}/>
                  <div className="flex-1"><div className="font-bold text-[13px] text-ink">{k.n}（{kidFamily(k.id).nm} {kidFamily(k.id).gv}さん宅）</div><div className="text-[11px] text-muted font-bold">{k.rec?'乗車予定':'欠席連絡あり（乗車予定から自動除外）'}</div></div>
                  {k.rec ? <Badge tone={(status[k.id]==='乗車'||status[k.id]==='降車')?'green':'gray'}>{status[k.id]||'待ち'}</Badge> : <Badge tone="red">欠席</Badge>}
                </div>
              ))}
              {stopKids(courses[selC], pin.si).length===0 && <div className="text-[13px] font-bold text-muted">この停留所の乗車予定はありません</div>}
              <div className="text-[11px] font-bold text-warm">前の停留所を出発すると、この停留所の家庭へ「まもなくバス到着（あと数分）」が自動送信されます。本番はGPS位置ベースの自動送信も可（モックは出発ボタン起点）。</div>
            </div>)}
      </Modal>
    </div>
  );
}

function ApproveBox(){
  // 各申請に承認フロー段階(担任→主任→園長)と詳細・点検項目を持たせ、タップで個別審査モーダルを開く。
  const items = [
    {kind:'要録', cat:'要録', who:'田中先生', target:'さくら（年長）', tone:'purple', note:'5領域すべてAI下書き済み・主任承認待ち', t:'10分前', stage:1,
      detail:'就学先へ送付する保育所児童保育要録。5領域＋特記事項をAIが日々の記録から下書き済み。',

    {kind:'月次配信', cat:'配信', who:'田中先生', target:'あおば組 6月号', tone:'pink', note:'写真6・動画1。写真NG家庭は自動オプトアウト済み', t:'1時間前', stage:2,

    {kind:'休暇申請', cat:'労務', who:'佐々木先生', target:'6/18 有給1日', tone:'green', note:'配置基準クリア（代替：渡辺先生）', t:'昨日', stage:1,
      detail:'有給休暇1日の申請。代替配置は渡辺先生。当日の行事予定なし。',
      checks:[['配置基準を満たす',true],['代替担当の確定',true],['行事との重複なし',true],['残有給日数の確認',true]]},
    {kind:'シフト変更', cat:'労務', who:'久保先生', target:'6/15 早番→遅番', tone:'blue', note:'年少クラスの配置基準に影響なし', t:'昨日', stage:1,
      detail:'6/15のシフトを早番から遅番へ変更する申請。',
      checks:[['配置基準に影響なし',true],['本人合意',true],['延長保育の人員',true],['通園バス担当の調整',false]]},
    {kind:'物販価格', cat:'物販', who:'ROHACHI', target:'体操服セット ¥4,800', tone:'orange', note:'仕入改定にともなう価格変更の承認依頼', t:'2日前', stage:2,
      detail:'仕入改定にともなう体操服セットの価格変更（¥4,500→¥4,800）。',
      checks:[['仕入根拠の添付',true],['保護者への周知文',false],['既存注文への影響',true],['販売開始日',true]]},
    {kind:'指導計画', cat:'計画', who:'田中先生', target:'あおば組 6月 週案', tone:'blue', note:'梅雨期のねらい・環境構成。AIが先月の記録から下書き', t:'30分前', stage:1,
      detail:'6月第3週の週案。ねらい・主な活動・環境構成・配慮事項を、先月の実践ログからAIが下書き。',
      checks:[['ねらいが発達段階に適合',true],['天候別の代替案あり',true],['アレルギー児への配慮',true],['行事との整合',false]]},
    {kind:'写真販売', cat:'配信', who:'ROHACHI', target:'春の遠足アルバム 公開', tone:'pink', note:'販売48枚・写真NG家庭は非表示。公開で保護者購入が可能に', t:'3時間前', stage:2,
      detail:'春の遠足の写真48枚を販売用に公開する申請。1枚¥150。写真NG家庭の児童は自動で非表示。',
      checks:[['写真NG家庭の除外',true],['顔写りの確認',true],['価格・販売期間の設定',true],['見本（無料）の選定',false]]},
    {kind:'お便り', cat:'配信', who:'佐々木先生', target:'保健だより 7月号', tone:'gray', note:'熱中症・プール時の健康管理。看護担当が作成', t:'昨日', stage:1,
      detail:'7月の保健だより。熱中症予防・プール前の健康チェック・夏の感染症についての家庭向け案内。',
      checks:[['医療的記載の根拠',true],['個人が特定される情報なし',true],['配信対象（全園）',true],['誤字・体裁',true]]},
  ];
  const STAGES = ['担任申請','主任確認','園長承認'];
  const CATS = ['すべて','要録','計画','配信','労務','物販'];
  // 承認/差戻しを状態化：操作した項目は結果バッジに変わり、承認待ち件数・承認済が連動して動く。
  const [acted,setActed] = useState({});
  const [cat,setCat] = useState('すべて');
  const [sel,setSel] = useState(null); // 個別審査モーダルの対象index
  const [comment,setComment] = useState(''); // 差戻し時の申し送りコメント
  const act = (i,v)=> { setActed(a=>({...a,[i]:v})); setSel(null); setComment(''); };
  const openSel = (i)=> { setSel(i); setComment(''); };
  const visIdx = items.map((it,i)=>i).filter(i=> cat==='すべて'||items[i].cat===cat);
  const approveAll = ()=> setActed(a=>{ const n={...a}; visIdx.forEach(i=>{ if(!n[i]) n[i]='ok'; }); return n; });
  const remain = items.filter((_,i)=>!acted[i]).length;
  const okCount = 8 + Object.values(acted).filter(v=>v==='ok').length;
  const s = sel!=null ? items[sel] : null;
  return (
    <div>
      <PageHead title="承認ボックス" sub="主任・園長の承認待ちを1か所に。記録から要録・配信・労務までワンストップで回す。"
        action={<Btn kind="primary" icon="check" onClick={approveAll}>表示中を一括承認</Btn>}/>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-5">
        {[['承認待ち',String(remain),'red'],['本日承認済',String(okCount),'green'],['要録 進捗','64%','ink'],['配信 待ち','1','orange']].map((s,i)=>(
          <Card key={i} className="p-4"><Stat label={s[0]} value={s[1]} tone={s[2]==='red'?'red':s[2]==='green'?'green':s[2]==='orange'?'orange':'ink'}/></Card>
        ))}
      </div>
      <div className="mb-4 flex flex-wrap gap-2">
        {CATS.map(c=>{
          const n = c==='すべて' ? items.filter((_,i)=>!acted[i]).length : items.filter((it,i)=>it.cat===c&&!acted[i]).length;
          return <button key={c} onClick={()=>setCat(c)} className={cx('px-3 py-1.5 rounded-xl text-[13px] font-bold border transition', cat===c?'bg-brand-500 text-white border-brand-500':'bg-white text-gray-500 border-[#E8D5C4] hover:bg-brand-50')}>{c}<span className={cx('ml-1.5 px-1.5 rounded-full text-[11px]', cat===c?'bg-white/25':'bg-cream')}>{n}</span></button>;
        })}
      </div>
      <Card>
        <CardHead icon="check" title={'承認待ち（'+visIdx.filter(i=>!acted[i]).length+'件 / '+(cat==='すべて'?'全カテゴリ':cat)+'）'} action={remain===0? <Badge tone="green"><Ic name="check" className="w-3 h-3"/>処理完了</Badge> : <span className="text-[12px] text-muted font-bold">古い順</span>}/>
        <div className="px-5 pb-5 space-y-2">
          {visIdx.map((i)=>{ const it=items[i]; return (
            <div key={i} className={cx('flex items-center gap-3 p-3 rounded-xl border transition', acted[i]==='ok'?'border-[#E8F5E9] bg-[#E8F5E9]/40':acted[i]==='ng'?'border-red-100 bg-red-50/40':'border-[#F3E6D9] hover:bg-cream/40')}>
              <span className="shrink-0"><Badge tone={it.tone}>{it.kind}</Badge></span>
              <button onClick={()=>openSel(i)} className="flex-1 min-w-0 text-left">
                <div className="font-bold text-ink text-[14px]">{it.target} <span className="text-muted font-bold text-[12px]">／ {it.who}</span></div>
                <div className="text-[12px] text-muted font-bold truncate">{it.note}</div>
              </button>
              {!acted[i] && <span className="shrink-0 hidden sm:inline"><Badge tone="amber">{STAGES[it.stage]}</Badge></span>}
              <div className="text-[12px] text-muted font-bold shrink-0 hidden md:block">{it.t}</div>
              {acted[i]
                ? <span className={cx('inline-flex items-center gap-1 text-[13px] font-bold shrink-0', acted[i]==='ok'?'text-green-600':'text-red-500')}><Ic name={acted[i]==='ok'?'check':'arrow'} className="w-4 h-4"/>{acted[i]==='ok'?'承認済':'差戻し済'}</span>
                : <div className="flex gap-1 shrink-0"><Btn kind="ghost" onClick={()=>act(i,'ng')}>差戻し</Btn><Btn kind="soft" icon="check" onClick={()=>act(i,'ok')}>承認</Btn></div>}
            </div>
          );})}
          {visIdx.length===0 && <div className="text-center py-6 text-[13px] text-muted font-bold">このカテゴリに承認待ちはありません</div>}
        </div>
      </Card>

      <Modal open={s!=null} onClose={()=>setSel(null)} icon="check" title={s&&(s.kind+'：'+s.target)} sub={s&&('申請者 '+s.who+' ・ '+s.t)}
        footer={s && (acted[sel]
          ? <Badge tone={acted[sel]==='ok'?'green':'red'}>{acted[sel]==='ok'?'承認済':'差戻し済'}</Badge>
          : <React.Fragment><Btn kind="ghost" icon="arrow" onClick={()=>act(sel,'ng')}>差戻し</Btn><Btn kind="primary" icon="check" onClick={()=>act(sel,'ok')}>承認する</Btn></React.Fragment>)}>
        {s && <div className="space-y-4">
          <p className="text-[13px] text-ink font-bold">{s.detail}</p>
          <div>
            <div className="text-[12px] text-muted font-bold mb-2">承認フロー</div>
            <div className="flex items-center gap-1">
              {STAGES.map((st,si)=>(

                  <div className="flex flex-col items-center">
                    <div className={cx('w-7 h-7 rounded-full flex items-center justify-center text-[11px] font-bold', si<s.stage?'bg-green-500 text-white':si===s.stage?'bg-brand-500 text-white':'bg-cream text-muted border border-[#E8D5C4]')}>{si<s.stage?'✓':si+1}</div>
                    <span className="text-[10px] font-bold text-ink mt-1 w-14 text-center">{st}</span>
                  </div>
                  {si<STAGES.length-1 && <div className={cx('flex-1 h-1 rounded-full', si<s.stage?'bg-green-300':'bg-cream')}/>}
                </React.Fragment>
              ))}
            </div>
          </div>
          <div>
            <div className="text-[12px] text-muted font-bold mb-2">承認前チェック（AI自動点検）</div>
            <div className="space-y-1.5">
              {s.checks.map((c,ci)=>(
                <div key={ci} className="flex items-center gap-2 text-[13px]">
                  <span className={cx('w-5 h-5 rounded-md flex items-center justify-center shrink-0', c[1]?'bg-[#E8F5E9] text-green-600':'bg-amber-50 text-amber-500')}><Ic name={c[1]?'check':'bell'} className="w-3.5 h-3.5"/></span>
                  <span className={cx('font-bold', c[1]?'text-ink':'text-amber-600')}>{c[0]}</span>
                  {!c[1] && <span className="text-[11px] text-amber-500 font-bold">要確認</span>}
                </div>
              ))}
            </div>
            {s.checks.some(c=>!c[1]) && <div className="mt-2 text-[11px] font-bold text-amber-600 flex items-center gap-1"><Ic name="bell" className="w-3.5 h-3.5"/>要確認の項目があります。承認前にご確認ください。</div>}
          </div>
          {!acted[sel] && <div>
            <div className="text-[12px] text-muted font-bold mb-1.5">差戻し・申し送りコメント（任意）</div>
            <textarea value={comment} onChange={e=>setComment(e.target.value)} placeholder="例）固有名詞の表記をご確認ください。修正後に再申請をお願いします。" className="w-full bg-cream rounded-xl border border-[#F3E6D9] p-3 text-[13px] text-ink font-bold h-20 outline-none resize-none placeholder:text-muted"/>
            <div className="flex flex-wrap gap-1.5 mt-2">{['誤字を確認してください','写真の選定をご確認ください','このまま承認可','再申請をお願いします'].map((q,qi)=><button key={qi} onClick={()=>setComment(q)} className="px-2.5 py-1 rounded-full text-[11px] font-bold border bg-white text-gray-600 border-[#E8D5C4] hover:border-brand-300">{q}</button>)}</div>
          </div>}
        </div>}
      </Modal>
    </div>
  );
}

function StaffApp({screen, go}){

/* 契約テナント詳細モーダル（マスターコンソール）。一覧行→chevron で開く。
   すべて架空ダミー：行データ(t)と index(i) から決定的に合成し、テナントごとに一貫した値を出す。
   課金/契約書送付/プラン変更は要承認のためトースト止まり。園・施設管理だけ読み取り遷移。 */
function opTenantSynth(t, i){
  const plan = t[2];
  const baseMRR = plan==='プレミアム' ? 128000 : plan==='スタンダード' ? 72000 : 42000;
  const parks = Number(t[3]) || 1;
  const users = Number(t[4]) || 0;
  const mrr = baseMRR + parks*18000 + users*120;
  const starts = ['2024-04-01','2023-04-01','2025-04-01','2024-10-01','2022-04-01'];
  const pays = ['口座振替','請求書(銀行振込)','クレジットカード'];
  const billStates = [['入金済','green'],['請求中','blue'],['一部入金','amber']];
  const bs = billStates[i % billStates.length];
  const active = 72 + (i*7) % 24;       // 72-95%
  const paidRate = bs[0]==='入金済' ? 100 : bs[0]==='一部入金' ? 60 + (i*5)%30 : 0;
  const parkNames = ['さくら','あおば','ふたば','つぼみ','みどり','こすもす'];
  const parkTypes = ['認定こども園','幼稚園','保育所'];
  const shown = Math.min(parks, 4);
  const facilities = Array.from({length:shown}, (_,k)=>({
    name: parkNames[k % parkNames.length]+'園',
    type: parkTypes[(i+k) % parkTypes.length],
    cap: 60 + ((i+k)*15)%90,
    status: (i+k)%5===0 ? ['準備中','amber'] : ['稼働中','green'],
  }));
  return { plan, parks, users, mrr, start: starts[i%starts.length], next: starts[i%starts.length].replace(/^(\d{4})/, m=>String(Number(m)+ (plan==='プレミアム'?2:1))),
           pay: pays[i%pays.length], bill: bs, billAmt: mrr, active, paidRate, facilities, hidden: parks-shown };
}

/* 園・施設詳細モーダル（マスターコンソール）。施設一覧行→chevron で開く。テナント詳細→園・施設管理 のドリル先。
   すべて架空ダミー：行データ(f)と index(i) から決定的に合成。施設削除/プラン変更は要承認のためトースト止まり。 */
function opFacilitySynth(f, i){
  const cap = parseInt(f[3]) || 0;
  const enr = parseInt(f[4]) || 0;
  const fill = cap ? Math.round(enr/cap*100) : 0;
  const classCount = Math.max(3, Math.round(cap/30));
  const ageBands = ['年少','年中','年長','満3歳','つぼみ','ほし'];
  const classes = Array.from({length:Math.min(classCount,6)}, (_,k)=>({
    name: ageBands[k % ageBands.length]+'組',
    kids: Math.round(enr/Math.min(classCount,6)) + ((i+k)%5) - 2,
    teacher: ['塚田','佐々木','田中','大野','森','岡'][(i+k)%6]+' 先生',
  }));
  const staff = 8 + Math.round(cap/24) + (i%3);
  const steps = ['契約','初期設定','データ移行','研修','稼働'];
  const stIdx = { '準備中':1, '導入中':2, '移行中':3, '稼働中':5 }[f[6]] || 1;
  return { cap, enr, fill, classCount, classes, staff, steps, stIdx,
           hiddenClasses: classCount - classes.length,
           active: 68 + (i*9)%28, lastLogin: stIdx>=5 ? '本日' : '導入支援中' };
}

/* 問い合わせチケット詳細モーダル（マスターコンソール）。チケット行→chevron で開く。
   すべて架空ダミー：行データ(t)と index(i) から決定的に合成。返信/ステータス変更/エスカレーションは
   対外/運用操作のためトースト止まり＋注記。 */
function opTicketSynth(t, i){
  const type = t[2];
  const sla = type==='緊急' ? '2時間' : type==='障害調査' ? '4時間' : '1営業日';
  const slaLeft = t[3]==='解決' ? '達成' : ['残り 48分','期限超過','残り 3時間','残り 5時間'][i % 4];
  const assignees = ['運営 田中','運営 佐々木','運営 大野','運営 森'];
  const requesters = ['園長 山田','主任 鈴木','事務 高橋','担任 小林'];
  const opened = ['本日 09:12','昨日 16:40','本日 11:05','2日前 14:20','本日 08:30'][i%5];
  const bodyMap = {
    'ログインできない先生がいる':'新任の先生1名が、配布したIDでログインできません。パスワード再設定メールも届かないとのことです。',
    '要録の様式追加の要望':'自治体提出様式に新しい項目が追加されました。要録テンプレートへの反映をお願いしたいです。',
    '請求書PDFの宛名変更':'請求書の宛名を法人名から園名に変更したいです。次回請求分から反映可能でしょうか。',
    'アプリが重い時間帯がある':'登園時間帯（8:00-9:00）にアプリの動作が重くなることがあります。確認をお願いします。',
    '保護者の写真DLができない':'一部の保護者から、購入済み写真のダウンロードができないと連絡がありました。',
  };
  const body = bodyMap[t[0]] || 'テナントからの問い合わせ内容（モック）。';
  const thread = [
    { who:'tenant', name: requesters[i%4], time: opened, text: body },
    { who:'op', name: assignees[i%4], time: opened.replace(/\d2$/, '38'), text: '受付しました。状況を確認のうえ、担当より折り返しご連絡します。' },
  ];
  if(t[3]==='解決'){ thread.push({ who:'op', name: assignees[i%4], time:'本日 13:20', text:'対応が完了しました。再発時はこのチケットに返信ください。' }); }
  else if(t[3]==='対応中'||t[3]==='調査中'){ thread.push({ who:'tenant', name: requesters[i%4], time:'本日 12:00', text:'ありがとうございます。引き続きよろしくお願いします。' }); }
  return { type, sla, slaLeft, assignee: assignees[i%4], requester: requesters[i%4], opened,
           firstResp: t[3]==='新規' ? '未' : (18 + (i*7)%40)+'分', thread };
}

/* リリース詳細モーダル（マスターコンソール）。リリースノート行→chevron で開く。
   すべて架空ダミー：行データ(n)と index(i) から決定的に合成。一般配信への昇格は要承認のためトースト止まり＋注記。 */
function opReleaseSynth(n, i){
  const status = n[2];
  // 段階配信：状態に応じて各リングの配信率を決定（予定=未配信／配信中=一般が途中／配信済=完了）
  const rollout = status==='配信済'
    ? [['社内検証',100],['先行配信',100],['一般配信',100]]
    : status==='配信中'
    ? [['社内検証',100],['先行配信',100],['一般配信',42]]
    : [['社内検証',100],['先行配信',30],['一般配信',0]];
  const changeMap = {
    'v1.5.0':[['改善','要録AIの推定精度を改善（誤抽出を低減）'],['新規','5領域提案に「根拠となった記録」を表示'],['改善','音声記録の整文スピードを向上']],
    'v1.4.2':[['改善','保護者アプリのオフライン打刻を安定化'],['修正','低速回線での同期失敗をリトライ'],['修正','一部端末で出欠が二重登録される問題']],
    'v1.4.1':[['修正','写真一括ダウンロードが失敗する不具合'],['改善','アルバム読み込みの高速化']],
  };
  const changes = changeMap[n[0]] || [['改善','各種の細かな改善（モック）']];
  const known = status==='予定' ? ['先行配信リングで回帰確認中（一般配信は承認後）'] : status==='配信中' ? ['一部の旧端末で表示が崩れる報告を調査中'] : [];
  const released = ['—','2026-05-28','2026-05-14'][i%3];
  const overall = rollout.reduce((s,r)=>s+r[1],0)/rollout.length;
  return { status, rollout, changes, known, released, overall: Math.round(overall) };
}
