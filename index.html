/* ============================== PRIMITIVES ============================== */
const cx = (...a)=>a.filter(Boolean).join(' ');
// モック操作可能化：遷移先が無いボタンでも「無反応」にせず、画面下に軽量トーストを出す。
const mockTap = (msg)=>{ try{ window.dispatchEvent(new CustomEvent('forkids-mocktap',{detail: msg||'この操作はモックのデモ表示です'})); }catch(e){} };

function Card({children, className=''}){
  return <div className={cx('bg-white rounded-2xl border border-[#F3E6D9] shadow-card', className)}>{children}</div>;
}
function CardHead({icon, title, action}){
  return (
    <div className="flex items-center justify-between px-5 pt-4 pb-3">
      <div className="flex items-center gap-2">
        {icon && <span className="text-brand-500"><Ic name={icon} className="w-[18px] h-[18px]"/></span>}
        <h3 className="font-bold text-ink text-[15px]">{title}</h3>
      </div>
      {action}
    </div>
  );
}
function Badge({children, tone='gray'}){
  const t = {
    gray:'bg-gray-100 text-gray-600', green:'bg-[#E8F5E9] text-green-700',
    orange:'bg-brand-50 text-brand-600', pink:'bg-[#FFE4EA] text-pink-600',
    purple:'bg-[#EEE7FB] text-purple-600', blue:'bg-[#E7F0FB] text-blue-600',
    amber:'bg-amber-50 text-amber-600', red:'bg-red-50 text-red-600',
  }[tone];
  return <span className={cx('inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[11px] font-bold', t)}>{children}</span>;
}
function Avatar({name, color='#FDC089', size=40, ring=false}){
  const ch = (name||'?').trim().charAt(0);
  return <div className={cx('flex items-center justify-center rounded-full font-bold text-white shrink-0', ring&&'ring-2 ring-white shadow')} style={{width:size,height:size,background:color,fontSize:size*0.42}}>{ch}</div>;
}
function Btn({children, kind='primary', icon, onClick, className=''}){
  const k = {
    primary:'bg-brand-500 hover:bg-brand-600 text-white shadow-soft',
    soft:'bg-brand-50 hover:bg-brand-100 text-brand-600',
    ghost:'bg-white hover:bg-brand-50 text-gray-500 border border-[#E8D5C4]',
    dark:'bg-ink hover:bg-slate-800 text-white',
  }[kind];
  // onClick 未指定のボタンは無反応にせず、ラベルを添えてモック・トーストを出す。
  const txt = typeof children==='string' ? children : null;
  const handle = onClick || (()=> mockTap(txt ? '「'+txt+'」はこのモックではデモ表示です' : 'この操作はモックのデモ表示です'));
  return <button onClick={handle} className={cx('inline-flex items-center justify-center gap-1.5 rounded-xl font-bold text-[13px] px-4 py-2 transition active:scale-[0.98]', k, className)}>
    {icon && <Ic name={icon} className="w-4 h-4"/>}{children}
  </button>;
}
function Tabs({tabs, active, onChange}){
  return (
    <div className="inline-flex bg-cream rounded-xl p-1 border border-[#F3E6D9]">
      {tabs.map(t=> <button key={t} onClick={()=>onChange(t)}
        className={cx('px-4 py-1.5 rounded-lg text-[13px] font-bold transition', active===t?'bg-white text-brand-600 shadow-card':'text-gray-500 hover:text-gray-700')}>{t}</button>)}
    </div>
  );
}
function Stat({label, value, tone='ink'}){
  const c = {ink:'text-ink', orange:'text-brand-500', red:'text-red-500', green:'text-green-600'}[tone];
  return <div className="text-center"><div className="text-[12px] text-muted font-bold mb-1">{label}</div><div className={cx('text-2xl font-extrabold',c)}>{value}</div></div>;
}
function AIChip(){ return <Badge tone="purple"><Ic name="ai" className="w-3 h-3"/>AI生成</Badge>; }

/* 汎用モーダル：fixed オーバーレイ（portal不要）。open=false で描画しない。 */
function Modal({open, onClose, title, sub, icon, children, footer, wide=false}){
  if(!open) return null;
  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4" onClick={onClose}>
      <div className="absolute inset-0 bg-ink/40 backdrop-blur-[2px]"/>
      <div onClick={e=>e.stopPropagation()} className={cx('relative bg-white w-full rounded-t-3xl sm:rounded-3xl shadow-xl border border-[#F3E6D9] max-h-[92vh] overflow-y-auto noscroll', wide?'sm:max-w-3xl':'sm:max-w-lg')}>
        <div className="flex items-start gap-3 px-5 pt-5 pb-3 sticky top-0 bg-white/95 backdrop-blur border-b border-[#F3E6D9] z-10">
          {icon && <span className="w-9 h-9 rounded-xl bg-brand-50 text-brand-500 flex items-center justify-center shrink-0"><Ic name={icon} className="w-5 h-5"/></span>}
          <div className="flex-1 min-w-0"><h3 className="font-extrabold text-ink text-[17px] leading-tight">{title}</h3>{sub && <p className="text-[12px] text-muted font-bold mt-0.5">{sub}</p>}</div>
          <button onClick={onClose} className="text-muted hover:text-ink p-1 -mr-1 shrink-0"><Ic name="plus" className="w-5 h-5 rotate-45"/></button>
        </div>
        <div className="px-5 py-4">{children}</div>
        {footer && <div className="px-5 py-3 border-t border-[#F3E6D9] bg-cream/40 flex flex-wrap gap-2 justify-end sticky bottom-0">{footer}</div>}
      </div>
    </div>
  );
}
/* トグルスイッチ（制御）。on/onToggle で状態を持つ側が管理。 */
function Toggle({on, onToggle, label}){
  return (
    <button onClick={onToggle} className="inline-flex items-center gap-2 text-[13px] font-bold text-ink">
      <span className={cx('w-9 h-5 rounded-full relative transition', on?'bg-brand-500':'bg-gray-300')}>
        <span className={cx('absolute top-0.5 w-4 h-4 bg-white rounded-full transition-all', on?'right-0.5':'left-0.5')}/>
      </span>
      {label}
    </button>
  );
}
/* 横バー（進捗・比率）。pct=0..100、tone で色。 */
function Bar({pct, tone='brand'}){
  const c={brand:'bg-brand-400', green:'bg-green-400', amber:'bg-amber-400', purple:'bg-purple-400', pink:'bg-pink-400', red:'bg-red-400'}[tone]||'bg-brand-400';
  return <div className="h-2 rounded-full bg-cream overflow-hidden border border-[#F3E6D9]"><div className={cx('h-full rounded-full', c)} style={{width:Math.max(0,Math.min(100,pct))+'%'}}/></div>;
}

  {n:'りく', age:'年長', klass:'ふたば組', rec:true}, {n:'ゆうと', age:'年長', klass:'つぼみ組', rec:false}, {n:'めい', age:'年長', klass:'つぼみ組', rec:true},
  {n:'そうた', age:'年長', klass:'あおば組', rec:false}, {n:'ねね', age:'年長', klass:'ふたば組', rec:true}, {n:'かいと', age:'年長', klass:'つぼみ組', rec:false},
  {n:'みお', age:'年長', klass:'あおば組', rec:true}, {n:'はると', age:'年長', klass:'ふたば組', rec:false}, {n:'ことね', age:'年長', klass:'つぼみ組', rec:true},

/* ============================== NAV CONFIG ============================== */
const NAV = [

];
const SCREEN_TITLES = {};
NAV.forEach(g=>g.items.forEach(i=>SCREEN_TITLES[i.id]=i.label));

/* ============================== RBAC（役割×機能アクセス） ============================== */
// 役割の定義（園内・3ロール）。admin=管理職(園長)は全権。office=事務(旧 主任＋事務を統合)。
const ROLES = {
  admin:   { label:'管理職', desc:'園長。全機能＋設定＋権限管理（園のトップ）', color:'#E07B4A' },
  office:  { label:'事務',  desc:'主任＋事務を統合。記録〜承認・育成・台帳・お便り＋精算/注文/労務', color:'#C8B3ED' },
  teacher: { label:'担任',  desc:'日々の記録・保育中心。精算/注文/労務/承認/設定/権限管理は既定非表示', color:'#FDC089' },
};
const ROLE_ORDER = ['admin','office','teacher'];
// 機能（画面id）→ 既定で閲覧できるロール。admin は常に全許可（canAccessで担保）。未掲載は全ロール可。
// office = 旧 主任(manager) ∪ 旧 事務(jimu) の権限を継承。
const SCREEN_ROLES = {
  teacher:['office','teacher'], exec:['office'],
  record:['office','teacher'], output:['office','teacher'],
  renraku:['office','teacher'], check:['office','teacher'],
  docs:['office','teacher'], lesson:['office','teacher'],
  portfolio:['office','teacher'], youroku:['office','teacher'],
  filebox:['office','teacher'],
  monthly:['office','teacher'], broadcast:['office','teacher'],
  notices:['office','teacher'], media:['office','teacher'],
  attendance:['office','teacher'], feedback:['office'],
  roster:['office','teacher'], kids:['office','teacher'],
  allergy:['office','teacher'], calendar:['office','teacher'],
  bus:['office'],
  // 精算・注文管理・労務・承認は事務まで。設定・権限管理は管理職(園長)のみ。
  billing:['office'], shop:['office'], shift:['office'],
  approve:['office'], settings:['admin'], roles:['admin'], org:['office'],
  help:['office','teacher'],
};
// 合成判定：ロール既定 ＋ 個別カスタム上書き（ov: {screenId:'grant'|'deny'}）。
// admin(管理職)は常に全許可・剥奪不可（ロックアウト防止）。第3引数は任意（シェルのロール既定判定は従来どおり）。
const canAccess = (role, id, ov) => {
  if(role==='admin') return true;
  const o = ov && ov[id];
  if(o==='grant') return true;
  if(o==='deny') return false;
  return (SCREEN_ROLES[id] || ROLE_ORDER).includes(role);
};

function AccessDenied({label, role}){
  return (
    <div className="max-w-lg">
      <Card className="p-8 text-center">

function AttendanceApprove(){
  const items = [
    {n:'ひなた', type:'欠席', reason:'発熱のため', tone:'red', t:'07:12'},
    {n:'りく', type:'遅刻', reason:'通院後に登園', tone:'amber', t:'07:30'},
    {n:'めい', type:'朝フレンド', reason:'8:00から', tone:'blue', t:'昨日'},
    {n:'そうた', type:'早退', reason:'15:00お迎え', tone:'purple', t:'昨日'},
    {n:'ことね', type:'午後フレンド', reason:'17:00まで', tone:'green', t:'昨日'},
  ];
  // 確認操作を状態化：個別「確認」/「まとめて確認」で確認済になり、残件数が減る。
  const [done,setDone] = useState({});
  const confirm = (i)=> setDone(d=>({...d,[i]:true}));
  const confirmAll = ()=> setDone(items.reduce((a,_,i)=>{a[i]=true;return a;},{}));
  const remain = items.filter((_,i)=>!done[i]).length;
  return (
    <div>
      <PageHead title="出欠申請の確認" sub="2026年6月2日（火）・ 保護者アプリからの欠席/遅刻/預かり申請をここで確認"
        action={<Btn kind="primary" icon="check" onClick={confirmAll}>まとめて確認</Btn>}/>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-5">
        {[['欠席','2','red'],['遅刻','1','amber'],['早退','1','purple'],['預かり','2','green']].map((s,i)=>(
          <Card key={i} className="p-4"><Stat label={s[0]} value={s[1]} tone={s[2]==='red'?'red':'ink'}/></Card>
        ))}
      </div>
      <Card>
        <CardHead icon="bell" title={'本日の申請（残り '+remain+' 件）'} action={remain===0&&<Badge tone="green"><Ic name="check" className="w-3 h-3"/>すべて確認済</Badge>}/>
        <div className="px-5 pb-5 space-y-2">
          {items.map((it,i)=>(
            <div key={i} className={cx('flex items-center gap-3 p-3 rounded-xl border transition', done[i]?'border-[#E8F5E9] bg-[#E8F5E9]/40 opacity-70':'border-[#F3E6D9] hover:bg-cream/40')}>
              <Avatar name={it.n} color={CAT[i]} size={40}/>
              <div className="flex-1"><div className="font-bold text-ink text-[14px]">{it.n} <span className="ml-1"><Badge tone={it.tone}>{it.type}</Badge></span></div><div className="text-[12px] text-muted font-bold">{it.reason}</div></div>
              <div className="text-[12px] text-muted font-bold">{it.t}</div>
              {done[i]
                ? <span className="inline-flex items-center gap-1 text-[13px] font-bold text-green-600"><Ic name="check" className="w-4 h-4"/>確認済</span>
                : <Btn kind="soft" icon="check" onClick={()=>confirm(i)}>確認</Btn>}
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

function ApproveBox(){
  const items = [
    {kind:'要録', who:'田中先生', target:'さくら（年長）', tone:'purple', note:'5領域すべてAI下書き済み・主任承認待ち', t:'10分前'},

  ];
  // 承認/差戻しを状態化：操作した項目は結果バッジに変わり、承認待ち件数・承認済が連動して動く。
  const [acted,setActed] = useState({});
  const act = (i,v)=> setActed(a=>({...a,[i]:v}));
  const approveAll = ()=> setActed(items.reduce((a,_,i)=>{a[i]='ok';return a;},{}));
  const remain = items.filter((_,i)=>!acted[i]).length;
  const okCount = 8 + Object.values(acted).filter(v=>v==='ok').length;
  return (
    <div>
      <PageHead title="承認ボックス" sub="主任・園長の承認待ちを1か所に。記録から要録・配信・労務までワンストップで回す。"
        action={<Btn kind="primary" icon="check" onClick={approveAll}>条件を満たす項目を一括承認</Btn>}/>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-5">
        {[['承認待ち',String(remain),'red'],['本日承認済',String(okCount),'green'],['要録 進捗','64%','ink'],['配信 待ち','1','orange']].map((s,i)=>(
          <Card key={i} className="p-4"><Stat label={s[0]} value={s[1]} tone={s[2]==='red'?'red':s[2]==='green'?'green':s[2]==='orange'?'orange':'ink'}/></Card>
        ))}
      </div>
      <Card>
        <CardHead icon="check" title={'承認待ち（'+remain+'件）'} action={remain===0? <Badge tone="green"><Ic name="check" className="w-3 h-3"/>処理完了</Badge> : <span className="text-[12px] text-muted font-bold">古い順</span>}/>
        <div className="px-5 pb-5 space-y-2">
          {items.map((it,i)=>(
            <div key={i} className={cx('flex items-center gap-3 p-3 rounded-xl border transition', acted[i]==='ok'?'border-[#E8F5E9] bg-[#E8F5E9]/40':acted[i]==='ng'?'border-red-100 bg-red-50/40':'border-[#F3E6D9] hover:bg-cream/40')}>
              <span className="shrink-0"><Badge tone={it.tone}>{it.kind}</Badge></span>
              <div className="flex-1 min-w-0"><div className="font-bold text-ink text-[14px]">{it.target} <span className="text-muted font-bold text-[12px]">／ {it.who}</span></div><div className="text-[12px] text-muted font-bold truncate">{it.note}</div></div>
              <div className="text-[12px] text-muted font-bold shrink-0">{it.t}</div>
              {acted[i]
                ? <span className={cx('inline-flex items-center gap-1 text-[13px] font-bold shrink-0', acted[i]==='ok'?'text-green-600':'text-red-500')}><Ic name={acted[i]==='ok'?'check':'arrow'} className="w-4 h-4"/>{acted[i]==='ok'?'承認済':'差戻し済'}</span>
                : <div className="flex gap-1 shrink-0"><Btn kind="ghost" onClick={()=>act(i,'ng')}>差戻し</Btn><Btn kind="soft" icon="check" onClick={()=>act(i,'ok')}>承認</Btn></div>}
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

  const toggle = (mi,id)=> setMembers(ms=>ms.map((m,i)=>{

          <span className="inline-flex items-center gap-1"><span className="inline-flex w-5 h-5 items-center justify-center rounded bg-gray-50 text-gray-300"><Ic name="lock" className="w-3 h-3"/></span>非表示</span>

                      const o = m.ov && m.ov[it.id];
                      const eff = canAccess(m.role, it.id, m.ov);
                      const cell = eff
                        ? <span className="inline-flex w-6 h-6 items-center justify-center rounded-md bg-green-50 text-green-600"><Ic name="check" className="w-4 h-4"/></span>

          <tbody>{members.map((m,i)=>{
            const ovCount = m.ov ? Object.keys(m.ov).length : 0;
            return (
              <tr key={i} className="border-b border-[#F7EFE7] last:border-0">
                <td className="px-5 py-3"><div className="flex items-center gap-2"><Avatar name={m.name} color={ROLES[m.role].color} size={30}/><span className="font-bold text-ink">{m.name}</span>{ovCount>0 && <Badge tone="amber">個別{ovCount}件</Badge>}</div></td>
                <td className="px-5 py-3 text-right">
                  <span className="inline-flex items-center gap-2 bg-cream border border-[#E8D5C4] rounded-lg px-3 py-1.5 font-bold text-ink"><span className="w-2.5 h-2.5 rounded-full" style={{background:ROLES[m.role].color}}/>{ROLES[m.role].label}<Ic name="chevron" className="w-3.5 h-3.5 text-muted rotate-90"/></span>
                </td>
              </tr>
            );
          })}</tbody>
        </table>
      </Card>
    </div>
  );

/* 画面下の軽量トースト：mockTap() / onClick未指定Btn からの forkids-mocktap を表示（無反応ゼロ化）。 */
function MockToast(){
  const [msg,setMsg] = React.useState(null);
  React.useEffect(()=>{
    const h = (e)=> setMsg(e.detail || 'この操作はモックのデモ表示です');
    window.addEventListener('forkids-mocktap', h);
    return ()=> window.removeEventListener('forkids-mocktap', h);
  },[]);
  React.useEffect(()=>{ if(msg===null) return; const t=setTimeout(()=>setMsg(null),1800); return ()=>clearTimeout(t); },[msg]);
  if(msg===null) return null;
  return (
    <div className="fixed bottom-5 left-1/2 -translate-x-1/2 z-[60] max-w-[90vw] flex items-center gap-2 bg-ink text-white text-[13px] font-bold px-4 py-2.5 rounded-xl shadow-phone">
      <Ic name="ai" className="w-4 h-4 text-cat-purple shrink-0"/><span className="truncate">{msg}</span>
    </div>
  );
}
function App(){
  const [mode,setMode] = useState('login'); // login | staff | parent | operator | public
  const [screen,setScreen] = useState('teacher');
  // リード状態は App レベルで保持＝公開問い合わせフォーム(PublicContact)と運営ポータル(OperatorApp)で共有
  const [leads,setLeads] = useState(OP_LEADS);
  const addLead = (lead)=> setLeads(s=>[...s, lead]);
  const go = (target)=>{
    if(target==='__login'){ setMode('login'); return; }
    if(target==='__parent'){ setMode('parent'); return; }
    if(target==='__operator'){ setMode('operator'); return; }
    if(target==='__public'){ setMode('public'); return; }
    if(STAFF_SCREENS[target]){ setScreen(target); setMode('staff'); return; }
  };
  return (
    <div className="h-full">
      {mode==='login' && <Login go={go}/>}
      {mode==='staff' && <StaffApp screen={screen} go={go}/>}
      {mode==='parent' && <ParentApp go={go}/>}
      {mode==='operator' && <OperatorApp go={go} leads={leads} addLead={addLead}/>}
      {mode==='public' && <PublicContact go={go} addLead={addLead}/>}
      <MockToast/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
