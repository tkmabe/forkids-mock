            <div className="mt-4">{label('お問い合わせ内容')}<textarea className={cx(inputCls,'h-28 leading-relaxed')} placeholder="ご質問・ご相談内容をご記入ください" value={f.message} onChange={e=>set('message',e.target.value)}/></div>
            <div className="mt-4 space-y-2">
              <label className="flex items-center gap-2 text-[13px] font-bold text-ink bg-cream rounded-xl px-3 py-2.5 border border-[#F3E6D9] cursor-pointer"><input type="checkbox" checked={f.notrobot} onChange={e=>set('notrobot',e.target.checked)}/><Ic name="shield" className="w-4 h-4 text-brand-500"/>私はロボットではありません<span className="text-[11px] text-muted font-bold ml-auto">（実運用ではCAPTCHAを設置）</span></label>
              <label className="flex items-start gap-2 text-[12px] font-bold text-ink bg-cream rounded-xl px-3 py-2.5 border border-[#F3E6D9] cursor-pointer"><input type="checkbox" className="mt-0.5" checked={f.agree} onChange={e=>set('agree',e.target.checked)}/><span>プライバシーポリシーに同意します。<br/><span className="text-muted">入力いただく個人情報はお問い合わせ対応の目的でのみ利用します（取得は必要最小限）。</span></span></label>
            </div>
            <Btn kind="primary" icon="send" className="w-full py-3 mt-5" onClick={submit}>この内容で送信する</Btn>
            <p className="text-[11px] text-muted font-bold text-center mt-3">※ モック：実送信はしません。送信すると運営ポータルの「商談・リード管理」に、流入経路＝問い合わせ(Web)・状態＝商談中 の新規リードとして起票されます。</p>
          </Card>
        ) : (
          <Card className="p-8 text-center">
            <div className="w-16 h-16 rounded-2xl bg-[#E8F5E9] text-green-600 mx-auto flex items-center justify-center mb-3"><Ic name="check" className="w-8 h-8"/></div>
            <h2 className="text-xl font-extrabold text-ink">お問い合わせを受け付けました</h2>
            <p className="text-[13px] text-muted font-bold mt-2">担当より2営業日以内にご連絡します。ありがとうございました。</p>
            <div className="mt-4 inline-flex items-center gap-2 text-[12px] font-bold text-brand-600 bg-brand-50 rounded-lg px-3 py-2"><Ic name="chart" className="w-4 h-4"/>（デモ）運営ポータルの「商談・リード管理」に新規リードが追加されました</div>
            <div className="flex gap-2 justify-center mt-5">
              <Btn kind="ghost" icon="logout" onClick={()=>go&&go('__login')}>ログインへ戻る</Btn>
              <Btn kind="primary" icon="globe" onClick={()=>go&&go('__operator')}>運営ポータルで確認（デモ）</Btn>
            </div>
          </Card>
        )}
        <div className="text-center text-[11px] text-warm font-bold mt-6">あおばグループ ・ 興縁株式会社 ｜ for Kids 公式サイト（プロトタイプ）</div>
      </div>
    </div>
  );
}

/* 画面下の軽量トースト：mockTap() / onClick未指定Btn からの forkids-mocktap を表示（無反応ゼロ化）。 */
function MockToast(){
  const [msg,setMsg] = React.useState(null);
  React.useEffect(()=>{
    const h = (e)=> setMsg(e.detail || 'この操作はモックのデモ表示です');
    window.addEventListener('forkids-mocktap', h);
    return ()=> window.removeEventListener('forkids-mocktap', h);
  },[]);
  React.useEffect(()=>{ if(msg===null) return; const t=setTimeout(()=>setMsg(null),1800); return ()=>clearTimeout(t); },[msg]);
  if(msg===null) return null;
  return (
    <div className="fixed bottom-5 left-1/2 -translate-x-1/2 z-[60] max-w-[90vw] flex items-center gap-2 bg-ink text-white text-[13px] font-bold px-4 py-2.5 rounded-xl shadow-phone">
      <Ic name="ai" className="w-4 h-4 text-cat-purple shrink-0"/><span className="truncate">{msg}</span>
    </div>
  );
}
function App(){
  const [mode,setMode] = useState('login'); // login | staff | parent | operator | public
  const [screen,setScreen] = useState('teacher');
  // リード状態は App レベルで保持＝公開問い合わせフォーム(PublicContact)と運営ポータル(OperatorApp)で共有
  const [leads,setLeads] = useState(OP_LEADS);
  const addLead = (lead)=> setLeads(s=>[...s, lead]);
  const go = (target)=>{
    if(target==='__login'){ setMode('login'); return; }
    if(target==='__parent'){ setMode('parent'); return; }
    if(target==='__operator'){ setMode('operator'); return; }
    if(target==='__public'){ setMode('public'); return; }
    if(STAFF_SCREENS[target]){ setScreen(target); setMode('staff'); return; }
  };
  return (
    <div className="h-full">
      {mode==='login' && <Login go={go}/>}
      {mode==='staff' && <StaffApp screen={screen} go={go}/>}
      {mode==='parent' && <ParentApp go={go}/>}
      {mode==='operator' && <OperatorApp go={go} leads={leads} addLead={addLead}/>}
      {mode==='public' && <PublicContact go={go} addLead={addLead}/>}
      <MockToast/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
